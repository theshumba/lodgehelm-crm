function init() {
  // Single-user mode: always log in as Master — skip the login picker entirely.
  if (!isLoggedIn()) {
    setCurrentUser('Master');
  }
  document.getElementById('current-user-display').textContent = getCurrentUser();
  hideLoginOverlay();
  updateMasterUI();
  renderResetButton();
  renderExportButton();
  applyConsultantDefaults();
  loadChatState();
  // Ensure Today is the default section on first login unless user has a saved pref
  if (!state.activeSection) state.activeSection = 'today';
  // Reflect persisted activeSection into UI
  showSection(state.activeSection);
  lucide.createIcons();
  // Boot shared-backend sync (safe no-op if Firebase isn't configured).
  startSharedSync();
}

// Initialize Firestore sync + merge remote leads into local state, live.
async function startSharedSync() {
  try {
    const ok = await LodgeHelmSync.init();
    if (!ok) {
      LodgeHelmSync.showSyncStatus('offline');
      return;
    }
    LodgeHelmSync.subscribe((remoteLeads, meta) => {
      meta = meta || {};
      // SAFE PER-LEAD MERGE: union of local + remote by id, keeping whichever copy has
      // the newer _modAt (ISO string compare; missing/empty _modAt is treated as oldest).
      // This never clobbers a local edit the rep just made that hasn't pushed yet.
      const byId = new Map();
      const localList = Array.isArray(state.leads) ? state.leads : [];
      for (const l of localList) { if (l && l.id) byId.set(l.id, l); }
      for (const r of remoteLeads) {
        if (!r || !r.id) continue;
        const local = byId.get(r.id);
        if (!local) { r.__remoteStamped = true; byId.set(r.id, r); continue; }
        const rAt = (typeof r._modAt === 'string') ? r._modAt : '';
        const lAt = (typeof local._modAt === 'string') ? local._modAt : '';
        // ACTIVITY IS ADDITIVE: whole-doc newest-wins would silently drop the loser's
        // just-logged call when two reps touch the SAME lead near-simultaneously. Union both
        // sides' activity into whichever doc wins so no call/disposition history is ever lost.
        const __k = a => `${(a && a.date) || ''}|${(a && a.action) || ''}|${(a && a.by) || ''}`;
        const winner = (rAt > lAt) ? r : local;
        const loser = (rAt > lAt) ? local : r;
        const have = new Set((winner.activity || []).map(__k));
        for (const a of (loser.activity || [])) {
          if (!have.has(__k(a))) { (winner.activity = winner.activity || []).push(a); have.add(__k(a)); }
        }
        if (Array.isArray(winner.activity)) winner.activity.sort((a, b) => String((b && b.date) || '').localeCompare(String((a && a.date) || '')));
        // Remote wins only if it is strictly newer than the local copy.
        if (rAt > lAt) { r.__remoteStamped = true; byId.set(r.id, r); }
        // else keep local (an unpushed newer edit, or a tie) and let it push on next saveState.
      }
      // Surface the first-snapshot empty-cloud signal to the deferred seed-push gate.
      if (meta.firstSnapshot) { LodgeHelmSync.__cloudKnownEmpty = !!meta.cloudEmpty; }
      // Drop the fictional sample leads once real cloud data is present.
      let merged = Array.from(byId.values());
      if (remoteLeads.length > 0) merged = merged.filter(l => l && l.source !== 'sample');
      // CLONE COLLAPSE (data-integrity): an earlier build could mint duplicate lead docs
      // (same businessName, new id). Such clones can linger in a rep's localStorage and would
      // otherwise be re-pushed by the push-back below as fresh cloud docs. Collapse any
      // LOCAL-ONLY lead whose businessName already exists in the cloud onto the canonical
      // remote lead — unioning its activity so no call history is lost — then drop it so it is
      // never recreated. A local-only lead with a NEW businessName is a genuine new lead: kept.
      if (remoteLeads.length > 0) {
        const __remoteIds = new Set();
        for (const r of remoteLeads) { if (r && r.id) __remoteIds.add(r.id); }
        // Canonical = the merged lead that owns a real cloud id, keyed by businessName.
        const __canonByName = new Map();
        for (const l of merged) {
          if (!l || !__remoteIds.has(l.id)) continue;
          const k = (l.businessName || '').trim().toLowerCase();
          if (k && !__canonByName.has(k)) __canonByName.set(k, l);
        }
        const __akey = a => `${(a && a.date) || ''}|${(a && a.action) || ''}|${(a && a.by) || ''}`;
        merged = merged.filter(l => {
          if (!l) return false;
          if (__remoteIds.has(l.id)) return true;            // canonical cloud lead — keep
          const k = (l.businessName || '').trim().toLowerCase();
          const canon = k ? __canonByName.get(k) : null;
          if (!canon || canon === l) return true;            // genuinely new lead — keep & sync
          // duplicate of an existing cloud lead → fold activity into the canonical lead, drop clone.
          const have = new Set((canon.activity || []).map(__akey));
          for (const a of (l.activity || [])) {
            if (!have.has(__akey(a))) { (canon.activity = canon.activity || []).push(a); have.add(__akey(a)); }
          }
          if (Array.isArray(canon.activity)) canon.activity.sort((a, b) => String((b && b.date) || '').localeCompare(String((a && a.date) || '')));
          return false;
        });
      }
      state.leads = merged;
      // __applyingRemote so saveState below doesn't re-stamp the just-merged remote leads.
      LodgeHelmSync.__applyingRemote = true;
      try {
        try { localStorage.setItem('lodgehelm-leads', JSON.stringify(state.leads)); } catch (_) {}
        // Push back any local-only or locally-newer leads the merge kept (real leads only).
        if (typeof LodgeHelmSync.pushLeads === 'function') LodgeHelmSync.pushLeads(state.leads);
      } finally { LodgeHelmSync.__applyingRemote = false; }
      // Clear the per-merge stamp markers now that this snapshot is fully applied.
      for (const l of state.leads) { if (l) delete l.__remoteStamped; }
      if (typeof renderAll === 'function') renderAll();
    });
    // First-EVER seed-push: only when the cloud is genuinely empty (fresh setup) AND our
    // local leads are real (not the fictional samples). Never push over existing cloud data.
    setTimeout(() => {
      if (!LodgeHelmSync.__cloudSeeded && LodgeHelmSync.__cloudKnownEmpty &&
          Array.isArray(state.leads) && state.leads.some(l => l && l.source !== 'sample')) {
        LodgeHelmSync.__cloudSeeded = true;
        LodgeHelmSync.pushLeads(state.leads.filter(l => l && l.source !== 'sample'));
      }
    }, 1500);
  } catch (e) {
    console.warn('startSharedSync failed', e);
  }
}
