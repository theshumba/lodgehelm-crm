/* ========== RESET ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ========== DESIGN TOKENS ========== */
:root, [data-theme="light"] {

/* ========== ANIMATIONS ========== */
@media (prefers-reduced-motion: no-preference) {

    from { opacity: 0; transform: translateY(8px); }

  @keyframes stageFlash {
    0% { background: var(--color-primary-highlight); }

  @keyframes fadeSlideOut {

  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes toastOut {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(12px); }

  .stage-updated { animation: stageFlash 800ms ease-out; }

}

/* ========== LAYOUT ========== */
.app-layout { display: flex; min-height: 100dvh; }

/* Top bar */
.top-bar { position: sticky; top: 0; height: 56px; background: var(--color-surface-2); box-shadow: var(--shadow-sm); z-index: 50; display: flex; align-items: center; padding: 0 var(--space-6); gap: var(--space-4); border-bottom: 1px solid oklch(from var(--color-text) l c h / 0.08); }
.top-bar-logo { display: flex; align-items: center; gap: var(--space-3); font-family: var(--font-display); font-weight: 700; font-size: var(--text-lg); color: var(--color-text); white-space: nowrap; }

.top-bar-search { flex: 1; max-width: 420px; margin: 0 auto; position: relative; }
.top-bar-search input { width: 100%; padding: var(--space-2) var(--space-3) var(--space-2) var(--space-10); border: 1px solid oklch(from var(--color-text) l c h / 0.12); border-radius: var(--radius-full); background: var(--color-surface); font-size: var(--text-sm); color: var(--color-text); transition: border-color var(--transition-interactive), box-shadow var(--transition-interactive); }
.top-bar-search input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15); }
.top-bar-search .search-icon { position: absolute; left: var(--space-3); top: 50%; transform: translateY(-50%); color: var(--color-text-faint); width: 18px; height: 18px; pointer-events: none; }
.top-bar-actions { display: flex; align-items: center; gap: var(--space-2); }
.top-bar-user { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs); color: var(--color-text-muted); white-space: nowrap; }
.top-bar-user strong { color: var(--color-text); font-weight: 600; }
.top-bar-user a { color: var(--color-primary); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
.top-bar-user a:hover { color: var(--color-primary-hover); }

/* Login Overlay */
.login-overlay { position: fixed; inset: 0; z-index: 9999; background: oklch(from var(--color-text) l c h / 0.45); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; opacity: 1; transition: opacity 300ms ease; }
.login-overlay.hidden { opacity: 0; pointer-events: none; }
.login-card { background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: var(--space-10) var(--space-8); width: 100%; max-width: 380px; box-shadow: 0 20px 60px oklch(0.2 0.01 80 / 0.18); text-align: center; }
.login-card .login-logo { display: flex; align-items: center; justify-content: center; gap: var(--space-3); margin-bottom: var(--space-2); }
.login-card .login-logo svg { width: 36px; height: 36px; color: var(--color-primary); }
.login-card .login-logo span { font-family: var(--font-display); font-weight: 800; font-size: var(--text-xl); color: var(--color-text); }

.login-card .login-form-group { text-align: left; margin-bottom: var(--space-4); }
.login-card .login-form-group label { display: block; font-size: var(--text-xs); font-weight: 600; color: var(--color-text); margin-bottom: var(--space-2); }
.login-card .login-form-group select,
.login-card .login-form-group input { width: 100%; padding: var(--space-3) var(--space-3); border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface); font-size: var(--text-sm); color: var(--color-text); transition: border-color var(--transition-interactive), box-shadow var(--transition-interactive); }
.login-card .login-form-group select:focus,
.login-card .login-form-group input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15); }
.login-card .login-btn { width: 100%; padding: var(--space-3) var(--space-4); background: var(--color-primary); color: var(--color-text-inverse); border: none; border-radius: var(--radius-md); font-weight: 600; font-size: var(--text-sm); cursor: pointer; transition: background var(--transition-interactive); margin-top: var(--space-4); }

/* Attribution text */

/* Activity Monitor */
.am-stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-6); }
.am-stat-card { background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.08); border-radius: var(--radius-lg); padding: var(--space-5); }

.am-stat-value { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 700; color: var(--color-text); }

.am-filters { display: flex; gap: var(--space-3); flex-wrap: wrap; margin-bottom: var(--space-6); align-items: flex-end; }
.am-filters .am-filter-group { display: flex; flex-direction: column; gap: var(--space-1); }
.am-filters .am-filter-group label { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); }
.am-filters .am-filter-group select { padding: var(--space-2) var(--space-3); border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface); font-size: var(--text-sm); color: var(--color-text); min-width: 160px; }

.am-feed-item { display: flex; align-items: flex-start; gap: var(--space-4); padding: var(--space-4); background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.06); border-radius: var(--radius-lg); transition: background var(--transition-interactive); }
.am-feed-item:hover { background: var(--color-surface-offset); }
.am-feed-time { font-size: var(--text-xs); color: var(--color-text-faint); white-space: nowrap; min-width: 120px; flex-shrink: 0; padding-top: 2px; }
.am-feed-body { flex: 1; font-size: var(--text-sm); line-height: 1.5; }
.am-feed-user { font-weight: 700; color: var(--color-text); }
.am-feed-action { color: var(--color-text-muted); }
.am-feed-lead { color: var(--color-primary); cursor: pointer; font-weight: 600; text-decoration: underline; text-decoration-color: oklch(from var(--color-primary) l c h / 0.3); text-underline-offset: 2px; }
.am-feed-lead:hover { text-decoration-color: var(--color-primary); }
.am-breakdown { margin-top: var(--space-4); }
.am-breakdown-title { font-family: var(--font-display); font-size: var(--text-sm); font-weight: 700; margin-bottom: var(--space-4); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.am-user-row { display: flex; align-items: center; gap: var(--space-4); padding: var(--space-3) 0; border-bottom: 1px solid oklch(from var(--color-text) l c h / 0.06); }

.am-user-name { font-weight: 600; font-size: var(--text-sm); min-width: 140px; flex-shrink: 0; }
.am-user-bar-wrap { flex: 1; background: var(--color-surface-offset); border-radius: var(--radius-full); height: 8px; overflow: hidden; }
.am-user-bar { height: 100%; background: var(--color-primary); border-radius: var(--radius-full); transition: width 400ms cubic-bezier(0.16, 1, 0.3, 1); }
.am-user-count { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); min-width: 36px; text-align: right; }
.am-empty { text-align: center; padding: var(--space-10); color: var(--color-text-faint); font-size: var(--text-sm); }
.am-user-calls { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); min-width: 52px; text-align: right; }
.call-logger { margin-top: var(--space-3); padding: var(--space-3); background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); }
.call-logger-head { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); margin-bottom: var(--space-2); }
.call-logger-head i { width: 14px; height: 14px; }
.call-dial-link { margin-left: auto; color: var(--color-primary); font-weight: 600; text-decoration: none; }
.call-dial-link:hover { text-decoration: underline; }
.call-no-phone { margin-left: auto; color: var(--color-text-faint); font-weight: 400; }
.call-outcome-select { width: 100%; font-size: var(--text-xs); }
.attribution i { display: inline; width: 10px; height: 10px; vertical-align: -1px; margin-right: 2px; }
.last-activity { font-size: 0.68rem; color: var(--color-text-faint); margin-top: var(--space-2); padding-top: var(--space-2); border-top: 1px solid var(--color-divider); line-height: 1.4; }
.theme-toggle { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: var(--color-text-muted); border-radius: var(--radius-md); cursor: pointer; transition: background var(--transition-interactive); }
.theme-toggle:hover { background: var(--color-surface-offset); color: var(--color-text); }
.hamburger { display: none; width: 44px; height: 44px; align-items: center; justify-content: center; border: none; background: transparent; color: var(--color-text); border-radius: var(--radius-md); cursor: pointer; }

.sidebar { width: 240px; min-width: 240px; background: var(--color-surface); border-right: 1px solid oklch(from var(--color-text) l c h / 0.08); display: flex; flex-direction: column; height: 100dvh; position: sticky; top: 0; overflow-y: auto; }
.sidebar-header { padding: var(--space-6) var(--space-5); display: flex; align-items: center; gap: var(--space-3); border-bottom: 1px solid oklch(from var(--color-text) l c h / 0.06); }

.nav-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: 500; color: var(--color-text-muted); cursor: pointer; transition: background var(--transition-interactive), color var(--transition-interactive); min-height: 44px; position: relative; user-select: none; border: none; background: transparent; width: 100%; text-align: left; }

.sidebar-footer { padding: var(--space-4) var(--space-5); border-top: 1px solid oklch(from var(--color-text) l c h / 0.06); font-size: var(--text-xs); color: var(--color-text-faint); }

/* ========== BUTTONS ========== */
.btn { display: inline-flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-4); border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: 500; font-family: var(--font-body); cursor: pointer; border: none; transition: background var(--transition-interactive), color var(--transition-interactive), box-shadow var(--transition-interactive); min-height: 44px; white-space: nowrap; }
.btn-primary { background: var(--color-primary); color: white; }
.btn-primary:hover { background: var(--color-primary-hover); }

.btn-danger-ghost { background: transparent; color: var(--color-error); }
.btn-danger-ghost:hover { background: var(--color-error-highlight); }
.btn-sm { padding: var(--space-1) var(--space-3); font-size: var(--text-xs); min-height: 32px; }
@media (pointer: coarse) { .btn-sm { min-height: 44px; } .call-logger .form-select.call-outcome-select { min-height: 44px; } }
.btn i { width: 16px; height: 16px; }

/* ========== BADGES ========== */
.badge { display: inline-flex; align-items: center; padding: 2px var(--space-2); border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 500; line-height: 1.4; white-space: nowrap; }
.badge-neutral { background: var(--color-surface-offset-2); color: var(--color-text-muted); }
.badge-teal { background: var(--color-primary-highlight); color: var(--color-primary); }
.badge-blue { background: var(--color-blue-highlight); color: var(--color-blue); }
.badge-purple { background: var(--color-purple-highlight); color: var(--color-purple); }
.badge-orange { background: var(--color-orange-highlight); color: var(--color-orange); }
.badge-gold { background: var(--color-gold-highlight); color: var(--color-gold); }
.badge-success { background: var(--color-success-highlight); color: var(--color-success); }
.badge-warning { background: var(--color-warning-highlight); color: var(--color-warning); }
.badge-error { background: var(--color-error-highlight); color: var(--color-error); }

/* ========== FORMS ========== */

.modal-header { padding: var(--space-6) var(--space-8); border-bottom: 1px solid oklch(from var(--color-text) l c h / 0.08); display: flex; justify-content: space-between; align-items: flex-start; position: sticky; top: 0; background: var(--color-surface); z-index: 1; border-radius: var(--radius-xl) var(--radius-xl) 0 0; }

.lead-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-5); }

.pill-tab { padding: var(--space-2) var(--space-4); border-radius: var(--radius-full); font-size: var(--text-sm); font-weight: 500; color: var(--color-text-muted); cursor: pointer; transition: all var(--transition-interactive); border: none; background: transparent; min-height: 36px; display: flex; align-items: center; gap: var(--space-2); }

/* ========== VIEW TOGGLE ========== */

.view-toggle-btn.active { background: var(--color-surface); color: var(--color-text); box-shadow: var(--shadow-sm); }
.view-toggle-btn i { width: 14px; height: 14px; }

/* ========== EMPTY STATE ========== */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--space-16) var(--space-8); text-align: center; gap: var(--space-5); }
.empty-state svg { width: 120px; height: 120px; color: var(--color-text-faint); opacity: 0.5; }
.empty-state h3 { font-family: var(--font-display); font-weight: 700; font-size: var(--text-lg); }
.empty-state p { color: var(--color-text-muted); font-size: var(--text-sm); max-width: 400px; }

/* ========== PLAYBOOKS ========== */
.playbooks-grid { display: grid; grid-template-columns: 1fr; gap: var(--space-6); }
.playbook-card { background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.08); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow var(--transition-interactive); }
.playbook-card:hover { box-shadow: var(--shadow-md); }
.playbook-header { padding: var(--space-6) var(--space-8); display: flex; align-items: flex-start; gap: var(--space-5); cursor: pointer; user-select: none; }
.playbook-icon { width: 48px; height: 48px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.playbook-icon.teal { background: var(--color-primary-highlight); color: var(--color-primary); }
.playbook-icon.purple { background: var(--color-purple-highlight); color: var(--color-purple); }
.playbook-icon.gold { background: var(--color-gold-highlight); color: var(--color-gold); }
.playbook-icon i { width: 24px; height: 24px; }
.playbook-title-area { flex: 1; }
.playbook-number { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: var(--space-1); }
.playbook-title { font-family: var(--font-display); font-weight: 700; font-size: var(--text-lg); line-height: 1.3; }
.playbook-subtitle { font-size: var(--text-sm); color: var(--color-text-muted); margin-top: var(--space-1); }
.playbook-expand-icon { color: var(--color-text-faint); transition: transform var(--transition-interactive); flex-shrink: 0; margin-top: var(--space-1); }
.playbook-expand-icon.expanded { transform: rotate(180deg); }
.playbook-body { padding: 0 var(--space-8) var(--space-6); display: none; }
.playbook-body.visible { display: block; }
.playbook-section { margin-bottom: var(--space-5); }
.playbook-section:last-child { margin-bottom: 0; }

.accordion-item { border: 1px solid oklch(from var(--color-text) l c h / 0.06); border-radius: var(--radius-md); overflow: hidden; margin-bottom: var(--space-2); }
.accordion-trigger { width: 100%; padding: var(--space-4) var(--space-5); background: var(--color-surface-offset); border: none; text-align: left; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); font-weight: 600; font-size: var(--text-sm); color: var(--color-text); font-family: var(--font-body); transition: background var(--transition-interactive); }
.accordion-trigger:hover { background: var(--color-surface-dynamic); }
.accordion-trigger .acc-icon { width: 16px; height: 16px; color: var(--color-text-muted); transition: transform var(--transition-interactive); flex-shrink: 0; }
.accordion-trigger.open .acc-icon { transform: rotate(180deg); }
.accordion-content { padding: 0; max-height: 0; overflow: hidden; transition: max-height 300ms ease, padding 300ms ease; }
.accordion-content.open { padding: var(--space-4) var(--space-5); max-height: 2000px; }
.accordion-content ul { list-style: disc; padding-left: var(--space-5); display: flex; flex-direction: column; gap: var(--space-2); }
.accordion-content li { font-size: var(--text-sm); color: var(--color-text-muted); line-height: 1.6; }
.accordion-content li strong { color: var(--color-text); font-weight: 600; }
.accordion-content p { font-size: var(--text-sm); color: var(--color-text-muted); line-height: 1.6; margin-bottom: var(--space-2); }
.accordion-content p:last-child { margin-bottom: 0; }

.playbook-callout { padding: var(--space-4) var(--space-5); background: var(--color-primary-highlight); border-radius: var(--radius-md); font-size: var(--text-sm); color: var(--color-text); display: flex; align-items: flex-start; gap: var(--space-3); margin-top: var(--space-4); }
.playbook-callout i { width: 18px; height: 18px; color: var(--color-primary); flex-shrink: 0; margin-top: 2px; }

/* ========== DYNAMIC LIST ITEMS (phone/email/contact) ========== */
.dynamic-list-item { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-2); }
.dynamic-list-item .form-input { margin-bottom: 0; }
.dynamic-list-item .remove-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: var(--color-error); cursor: pointer; border-radius: var(--radius-sm); flex-shrink: 0; }
.dynamic-list-item .remove-btn:hover { background: var(--color-error-highlight); }
.contact-fields { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2); padding: var(--space-3); background: var(--color-surface-offset); border-radius: var(--radius-md); margin-bottom: var(--space-2); position: relative; }
.contact-fields .remove-btn { position: absolute; top: var(--space-2); right: var(--space-2); }
.add-item-btn { font-size: var(--text-xs); color: var(--color-primary); cursor: pointer; background: none; border: none; font-weight: 500; padding: var(--space-1) 0; display: inline-flex; align-items: center; gap: var(--space-1); }
.add-item-btn:hover { text-decoration: underline; }

/* ========== INLINE NOTE ADD ========== */
.add-note-inline { display: flex; gap: var(--space-2); margin-top: var(--space-2); }
.add-note-inline input { flex: 1; padding: var(--space-1) var(--space-2); border: 1px solid oklch(from var(--color-text) l c h / 0.12); border-radius: var(--radius-sm); font-size: var(--text-xs); background: var(--color-surface-2); }

/* ========== CRM OVERDUE CHECKBOX ========== */
.overdue-check { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs); color: var(--color-warning); cursor: pointer; white-space: nowrap; }
.overdue-check input { accent-color: var(--color-warning); width: 16px; height: 16px; }

/* ========== RESPONSIVE ========== */
@media (max-width: 1024px) {
  .lead-grid { grid-template-columns: 1fr; }
  .qual-layout { grid-template-columns: 1fr; }
  .crm-row { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -260px; z-index: 90; transition: left 250ms cubic-bezier(0.16, 1, 0.3, 1); width: 260px; min-width: 260px; }
  .sidebar.open { left: 0; }
  .hamburger { display: flex; }
  .top-bar-logo span { display: none; }
  .main-content { padding: var(--space-4); }
  .section-header { flex-direction: column; align-items: flex-start; }
  .filter-bar { flex-direction: column; align-items: stretch; }
  .filter-bar .form-input, .filter-bar .form-select { width: 100%; min-width: auto; }
  .filter-bar .count-label { margin-left: 0; }
  .crm-row { grid-template-columns: 1fr; }
  .kanban-column { min-width: 240px; }
  .meeting-card { flex-direction: column; }
  .stats-bar { flex-direction: column; }
  .playbook-header { flex-direction: column; gap: var(--space-3); }
  .calendar-day { min-height: 50px; padding: var(--space-1); }
}
.mobile-overlay { position: fixed; inset: 0; background: oklch(0 0 0 / 0.4); z-index: 89; opacity: 0; pointer-events: none; transition: opacity 200ms ease; }
.mobile-overlay.active { opacity: 1; pointer-events: auto; }

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-surface-dynamic); border-radius: var(--radius-full); }
::-webkit-scrollbar-thumb:hover { background: var(--color-text-faint); }

/* ========== MISC ========== */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
.text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gap-2 { gap: var(--space-2); }
.gap-3 { gap: var(--space-3); }
.mb-2 { margin-bottom: var(--space-2); }
.mb-3 { margin-bottom: var(--space-3); }
.mb-4 { margin-bottom: var(--space-4); }
.mt-2 { margin-top: var(--space-2); }
.mt-4 { margin-top: var(--space-4); }
.flex { display: flex; }
.flex-wrap { flex-wrap: wrap; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }

/* ========== OPPORTUNITY SCORE BADGE ========== */
.opp-score-badge { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; font-size: 0.7rem; font-weight: 700; color: white; flex-shrink: 0; }
.opp-score-badge.score-high { background: var(--color-success); }
.opp-score-badge.score-mid { background: var(--color-orange); }
.opp-score-badge.score-low { background: var(--color-text-faint); }

/* ========== CALL LIST (ranked cold-call queue) ========== */
.call-list-intro { color: var(--color-text-muted); font-size: var(--text-sm); margin: 0 0 var(--space-4); max-width: 70ch; }
.call-list { display: flex; flex-direction: column; gap: var(--space-3); }
.call-row { display: grid; grid-template-columns: auto auto 1fr auto; align-items: center; gap: var(--space-4); padding: var(--space-4) var(--space-5); }
.call-row.called { opacity: 0.6; }
.call-rank { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 700; color: var(--color-text-faint); min-width: 2.5ch; text-align: center; }
.call-info-score { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 48px; height: 48px; border-radius: 50%; color: white; flex-shrink: 0; line-height: 1; }
.call-info-score.score-high { background: var(--color-success); }
.call-info-score.score-mid { background: var(--color-orange); }
.call-info-score.score-low { background: var(--color-text-faint); }
.call-score-num { font-family: var(--font-display); font-size: var(--text-md); font-weight: 700; }
.call-score-lbl { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.85; }
.call-main { min-width: 0; }
.call-name-row { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-2); }
.call-meta { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; margin-top: var(--space-2); font-size: var(--text-sm); color: var(--color-text-muted); }
.call-phone { display: inline-flex; align-items: center; gap: 4px; color: var(--color-primary); font-weight: 600; text-decoration: none; }
.call-phone:hover { text-decoration: underline; }
.call-phone i { width: 14px; height: 14px; }
.call-actions { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; justify-content: flex-end; }
@media (max-width: 720px) {
  .call-row { grid-template-columns: auto auto 1fr; }
  .call-actions { grid-column: 1 / -1; justify-content: flex-start; }
}

/* ========== RESEARCH CHECKLIST ========== */
.research-checklist { margin-top: var(--space-4); padding: var(--space-4); background: var(--color-surface-offset); border-radius: var(--radius-md); border: 1px solid oklch(from var(--color-text) l c h / 0.08); }
.research-checklist h4 { font-family: var(--font-display); font-size: var(--text-sm); font-weight: 700; margin-bottom: var(--space-3); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.research-checklist label { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) 0; font-size: var(--text-sm); cursor: pointer; }
.research-checklist label input[type="checkbox"] { accent-color: var(--color-primary); width: 16px; height: 16px; }

/* ========== EMAIL SIGNATURES MODAL ========== */
.sig-card { background: var(--color-surface-offset); border-radius: var(--radius-md); padding: var(--space-4) var(--space-5); margin-bottom: var(--space-3); border: 1px solid oklch(from var(--color-text) l c h / 0.08); }
.sig-card.sig-highlight { border-color: var(--color-primary); background: var(--color-primary-highlight); }
.sig-card pre { font-family: var(--font-body); font-size: var(--text-sm); white-space: pre-wrap; line-height: 1.6; margin-bottom: var(--space-3); }
.sig-copy-btn { font-size: var(--text-xs); }

/* ========== REPORTS SECTION ========== */
.reports-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-6); }
.report-stat-card { background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.08); border-radius: var(--radius-lg); padding: var(--space-4); text-align: center; }
.report-stat-value { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 700; color: var(--color-primary); }
.report-stat-label { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-1); }
.report-comparison { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: var(--space-5); }
.report-user-card { background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.08); border-radius: var(--radius-lg); padding: var(--space-5); }
.report-user-card h3 { font-family: var(--font-display); font-size: var(--text-sm); font-weight: 700; margin-bottom: var(--space-3); }
.report-user-stat { display: flex; justify-content: space-between; padding: var(--space-2) 0; font-size: var(--text-sm); border-bottom: 1px solid oklch(from var(--color-text) l c h / 0.04); }

/* ========== AI CHATBOT ========== */
.chat-fab { position: fixed; bottom: var(--space-6); right: var(--space-6); width: 56px; height: 56px; border-radius: 50%; background: var(--color-primary); color: var(--color-text-inverse); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px oklch(0.2 0.01 80 / 0.25); z-index: 400; transition: transform var(--transition-interactive), box-shadow var(--transition-interactive); }
.chat-fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px oklch(0.2 0.01 80 / 0.3); }
.chat-fab svg { width: 26px; height: 26px; }

.chat-panel { position: fixed; bottom: calc(var(--space-6) + 66px); right: var(--space-6); width: 380px; height: 500px; background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.12); border-radius: var(--radius-xl); box-shadow: 0 8px 32px oklch(0.2 0.01 80 / 0.15); z-index: 401; display: flex; flex-direction: column; overflow: hidden; transform: translateY(20px) scale(0.95); opacity: 0; pointer-events: none; transition: transform 250ms cubic-bezier(0.16, 1, 0.3, 1), opacity 200ms ease; }
.chat-panel.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }

.chat-header { padding: var(--space-3) var(--space-4); background: var(--color-primary); color: var(--color-text-inverse); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.chat-header-left { display: flex; align-items: center; gap: var(--space-2); font-family: var(--font-display); font-weight: 700; font-size: var(--text-sm); }
.chat-header-actions { display: flex; gap: var(--space-1); }
.chat-header-actions button { background: none; border: none; color: var(--color-text-inverse); cursor: pointer; padding: var(--space-1); border-radius: var(--radius-sm); opacity: 0.8; }
.chat-header-actions button:hover { opacity: 1; background: oklch(1 0 0 / 0.15); }
.chat-header-actions button.active { opacity: 1; background: oklch(1 0 0 / 0.2); }

.chat-tabs { display: flex; border-bottom: 1px solid oklch(from var(--color-text) l c h / 0.08); flex-shrink: 0; }
.chat-tab { flex: 1; padding: var(--space-2); text-align: center; font-size: var(--text-xs); font-weight: 600; cursor: pointer; border: none; background: none; color: var(--color-text-muted); border-bottom: 2px solid transparent; }
.chat-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }

.chat-messages { flex: 1; overflow-y: auto; padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-3); }
.chat-msg { max-width: 85%; padding: var(--space-3) var(--space-4); border-radius: var(--radius-lg); font-size: var(--text-sm); line-height: 1.5; word-break: break-word; }
.chat-msg.user { align-self: flex-end; background: var(--color-primary); color: var(--color-text-inverse); border-bottom-right-radius: var(--radius-sm); }
.chat-msg.ai { align-self: flex-start; background: var(--color-surface-offset); color: var(--color-text); border-bottom-left-radius: var(--radius-sm); }
.chat-msg.system { align-self: center; background: var(--color-surface-offset); color: var(--color-text-muted); font-size: var(--text-xs); text-align: center; max-width: 100%; }

.chat-typing { display: flex; gap: 4px; padding: var(--space-3) var(--space-4); align-self: flex-start; }
.chat-typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-faint); animation: chatDot 1.4s infinite; }
.chat-typing span:nth-child(2) { animation-delay: 0.2s; }
.chat-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes chatDot { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

.chat-input-area { padding: var(--space-3); border-top: 1px solid oklch(from var(--color-text) l c h / 0.08); display: flex; gap: var(--space-2); flex-shrink: 0; }
.chat-input-area input { flex: 1; border: 1px solid oklch(from var(--color-text) l c h / 0.12); border-radius: var(--radius-md); padding: var(--space-2) var(--space-3); font-size: var(--text-sm); background: var(--color-surface); }
.chat-input-area button { background: var(--color-primary); color: var(--color-text-inverse); border: none; border-radius: var(--radius-md); padding: var(--space-2) var(--space-3); cursor: pointer; font-size: var(--text-sm); font-weight: 600; }
.chat-input-area button:hover { background: var(--color-primary-hover); }

.chat-settings { padding: var(--space-5); display: flex; flex-direction: column; gap: var(--space-4); flex: 1; }
.chat-settings label { font-size: var(--text-sm); font-weight: 600; display: block; margin-bottom: var(--space-1); }
.chat-settings input { width: 100%; border: 1px solid oklch(from var(--color-text) l c h / 0.12); border-radius: var(--radius-md); padding: var(--space-2) var(--space-3); font-size: var(--text-sm); }
.chat-settings p { font-size: var(--text-xs); color: var(--color-text-muted); }

.chat-learnings { flex: 1; overflow-y: auto; padding: var(--space-4); }
.chat-learning-item { padding: var(--space-3); background: var(--color-surface-offset); border-radius: var(--radius-md); margin-bottom: var(--space-2); font-size: var(--text-sm); }

/* Reset Data button */
.reset-data-btn { background: none; border: 1px solid var(--color-error); color: var(--color-error); border-radius: var(--radius-sm); padding: var(--space-1) var(--space-2); font-size: 0.65rem; cursor: pointer; margin-top: var(--space-2); display: block; width: 100%; }
.reset-data-btn:hover { background: var(--color-error-highlight); }

/* Sidebar links */
.sidebar-link { display: block; padding: var(--space-2) 0; font-size: var(--text-xs); color: var(--color-text-muted); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; background: none; border: none; text-align: left; width: 100%; }
.sidebar-link:hover { color: var(--color-primary); }

/* ========== PIPELINE VALUE BAR ========== */
.pipeline-bar { display: flex; flex-wrap: wrap; align-items: baseline; gap: var(--space-4); padding: var(--space-4) var(--space-5); margin-bottom: var(--space-4); background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-lg); }
.pipeline-stat { display: inline-flex; align-items: baseline; gap: var(--space-2); }
.pipeline-stat-value { font-family: var(--font-display); font-weight: 800; font-size: var(--text-2xl); color: var(--color-text); line-height: 1; }
.pipeline-stat-label { font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.pipeline-sep { color: var(--color-text-faint); font-weight: 700; }
.pipeline-meta { margin-left: auto; font-size: var(--text-xs); color: var(--color-text-muted); }

/* ========== DEAL VALUE INPUT ========== */
.deal-value-wrap { margin-top: var(--space-2); }
.deal-value-wrap.prominent { padding: var(--space-2) var(--space-3); background: var(--color-primary-highlight); border-radius: var(--radius-md); }
.deal-value-input { display: inline-flex; align-items: center; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 2px 6px; gap: 2px; }
.deal-value-input .deal-currency { font-weight: 600; color: var(--color-text-muted); }
.deal-value-input input { border: none; outline: none; background: transparent; width: 96px; padding: 4px 0; font-size: var(--text-sm); color: var(--color-text); font-weight: 600; }
.deal-value-wrap.prominent .deal-value-input input { font-size: var(--text-base); }
.deal-badge { background: oklch(from var(--color-primary) l c h / 0.12); color: var(--color-primary); font-weight: 600; }

/* ========== TODAY CHIP ========== */
.today-chip { display: inline-flex; align-items: center; gap: 4px; padding: 6px 10px; border: 1px solid var(--color-border); border-radius: var(--radius-full); background: var(--color-surface); font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); cursor: pointer; transition: all var(--transition-interactive); }
.today-chip:hover { color: var(--color-text); border-color: var(--color-primary); }
.today-chip.active { background: var(--color-primary); color: var(--color-text-inverse); border-color: var(--color-primary); }
.today-chip i { width: 14px; height: 14px; }

/* ========== BULK ACTIONS BAR ========== */
.bulk-bar { display: none; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); margin-bottom: var(--space-3); background: var(--color-text); color: var(--color-text-inverse); border-radius: var(--radius-lg); animation: slide-down 220ms ease; }
.bulk-bar.active { display: flex; }
.bulk-count { font-weight: 700; font-size: var(--text-sm); }
.bulk-action-select { max-width: 240px; }
@keyframes slide-down { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ========== HOME / DASHBOARD ========== */

.home-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-6); }
.home-stat-card { padding: var(--space-5); background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-lg); }
.home-stat-card .stat-label { font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: var(--space-2); }
.home-stat-card .stat-value { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: 800; color: var(--color-text); }
.home-stat-card.accent { border-left: 4px solid var(--color-primary); }
.home-columns { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-6); }
@media (max-width: 880px) { .home-columns { grid-template-columns: 1fr; } }
.home-section-title { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-3); }
.priority-list { display: flex; flex-direction: column; gap: var(--space-2); }
.priority-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); cursor: pointer; transition: background var(--transition-interactive); }
.priority-item:hover { background: var(--color-surface-offset); }
.priority-item.overdue { border-left: 4px solid var(--color-error); }
.priority-item.today { border-left: 4px solid var(--color-warning); }
.priority-item.opportunity { border-left: 4px solid var(--color-primary); }
.priority-item .pi-title { font-weight: 600; color: var(--color-text); }
.priority-item .pi-meta { font-size: var(--text-xs); color: var(--color-text-muted); }
.priority-item .pi-spacer { flex: 1; }
.recent-activity-feed { display: flex; flex-direction: column; gap: var(--space-2); }
.recent-activity-item { padding: var(--space-2) var(--space-3); background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: var(--text-sm); }
.recent-activity-item .ra-meta { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 2px; }

/* ========== BRIEF MODAL ========== */
.brief-doc { background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-5); font-family: var(--font-sans); font-size: var(--text-sm); line-height: 1.55; white-space: pre-wrap; max-height: 60vh; overflow-y: auto; color: var(--color-text); }

<script>
// ========== STATE ==========
const state = {
  leads: [],
  activeSection: 'today',
  crmView: 'list',
  meetingsView: 'list',
  calendarMonth: new Date().getMonth(),
  calendarYear: new Date().getFullYear(),
  archiveTab: 'follow_up',
  filters: {
    leadBank: { search: '', status: 'all', source: 'all', completeness: 'all', assignedTo: 'all', today: false },
    callList: { cohort: 'ready', hideCalled: false },
    crm: { search: '', stage: 'all', priority: 'all', overdueOnly: false, assignedTo: 'all', today: false },
    archive: {}
  },
  panelOpen: false,
  modalOpen: false,
  panelTrigger: null,
  modalTrigger: null,
  expandedNotes: {},
  deleteConfirm: {},
  calendarPopover: null,
  bulkSelection: [],
  bulkScope: null // 'crm' | 'lead-bank'
};

// ========== LODGEHELM SYNC (Firestore shared backend) ==========
// Syncs state.leads across all devices so the Master view can see everyone's work.
// Safely no-ops if Firebase config is left as placeholders — app still works offline.
const LodgeHelmSync = (function () {
  let db = null;
  let auth = null;
  let ready = false;
  let unsubscribeLeads = null;
  let applyingRemote = false;       // guard so onSnapshot callbacks don't re-push writes
  let lastPushed = new Map();       // leadId -> JSON string of last-pushed lead (echo key)
  let pushTimer = null;
  let pendingPush = false;
  let lastLeads = null;            // latest leads array handed to pushLeads (for flush())
  // Echo-dedup key: the lead minus volatile server-side fields. _srvAt is a serverTimestamp
  // sentinel on write but a resolved Timestamp on read, so it must be stripped from the key
  // or every push would look "changed" and loop forever (M1 safety).
  function _echoKey(lead) { const o = { ...lead }; delete o._srvAt; return o; }
  let onRemoteCb = null;
  let firstSnapshotSeen = false;    // becomes true after the first remote snapshot arrives
  let cloudWasEmpty = false;        // true only if that first snapshot had ZERO docs
  const pendingDeletes = new Set(); // lead ids the app has EXPLICITLY deleted (scoped delete safety)

  function isConfigured() {
    const c = window.LODGEHELM_FIREBASE_CONFIG;
    if (!c) return false;
    return c.apiKey && !String(c.apiKey).startsWith('PASTE') &&
           c.projectId && !String(c.projectId).startsWith('PASTE');
  }

  async function init() {
    if (ready) return true;
    if (!isConfigured()) {
      console.info('[LodgeHelmSync] Firebase not configured — running in local-only mode. See FIREBASE-SETUP.md.');
      return false;
    }
    if (!window.__fb) {
      // SDK still loading — wait for the fb-ready event once.
      await new Promise(r => window.addEventListener('fb-ready', r, { once: true }));
    }
    try {
      const app = window.__fb.initializeApp(window.LODGEHELM_FIREBASE_CONFIG);
      auth = window.__fb.getAuth(app);
      db = window.__fb.getFirestore(app);
      await window.__fb.signInAnonymously(auth);
      ready = true;
      LodgeHelmSync.__db = db; // expose for the L1 create-if-absent seed transaction
      console.info('[LodgeHelmSync] Connected. Data will sync across all devices.');
      showSyncStatus('connected');
      return true;
    } catch (e) {
      console.warn('[LodgeHelmSync] Init failed:', e);
      showSyncStatus('error', e.message || 'Sync error');
      return false;
    }
  }

  function subscribe(cb) {
    if (!ready || !db) return;
    onRemoteCb = cb;
    const col = window.__fb.collection(db, 'leads');
    if (unsubscribeLeads) unsubscribeLeads();
    unsubscribeLeads = window.__fb.onSnapshot(col,
      snap => {
        const remoteLeads = [];
        snap.forEach(d => {
          const raw = d.data();
          // Normalise the sync timestamp to an ISO string for merge comparison.
          // _modAt may be a Firestore Timestamp (legacy serverTimestamp writes) or an ISO string (new writes).
          let modAt = raw._modAt;
          if (modAt && typeof modAt.toDate === 'function') { try { modAt = modAt.toDate().toISOString(); } catch (_) { modAt = ''; } }
          const lead = { ...raw };
          lead._modAt = (typeof modAt === 'string') ? modAt : '';
          // Normalise the server timestamp (M1): _srvAt is written as serverTimestamp() and
          // comes back as a Firestore Timestamp — convert to ISO so the merge can order by it.
          let srvAt = raw._srvAt;
          if (srvAt && typeof srvAt.toDate === 'function') { try { srvAt = srvAt.toDate().toISOString(); } catch (_) { srvAt = ''; } }
          lead._srvAt = (typeof srvAt === 'string') ? srvAt : '';
          // Keep _modAt/_modBy/_srvAt ON the lead so the app-level merge can compare versions.
          remoteLeads.push(lead);
          // lastPushed ledger stores the serialization we'd re-push, so identical remote
          // echoes are skipped by pushLeads (prevents push/snapshot loops). _srvAt is volatile
          // (sentinel on write, Timestamp on read) so it MUST be excluded from the echo key.
          lastPushed.set(lead.id, JSON.stringify(_echoKey(lead)));
        });
        // Record cloud-empty state exactly once, on the very first snapshot.
        if (!firstSnapshotSeen) { cloudWasEmpty = (remoteLeads.length === 0); }
        applyingRemote = true;
        try { onRemoteCb && onRemoteCb(remoteLeads, { firstSnapshot: !firstSnapshotSeen, cloudEmpty: cloudWasEmpty }); }
        finally { applyingRemote = false; firstSnapshotSeen = true; }
      },
      err => {
        console.warn('[LodgeHelmSync] Subscription error:', err);
        showSyncStatus('error', err.message || 'Subscription error');
      }
    );
  }

  // Push changed leads to Firestore. Debounced to coalesce rapid edits.
  function pushLeads(leads) {
    if (!ready || !db) return;
    if (applyingRemote) return; // don't echo remote writes back
    lastLeads = leads; // remember the latest list so flush() can commit it synchronously (H1)
    pendingPush = true;
    if (pushTimer) return;
    pushTimer = setTimeout(async () => {
      pushTimer = null;
      if (!pendingPush) return;
      pendingPush = false;
      try {
        const currentIds = new Set();
        const __rawUser = (typeof getCurrentUser === 'function') ? getCurrentUser() : 'Unknown';
        // L5: canonicalise the writer so attribution can't split across name variants.
        const user = (typeof resolveRepName === 'function') ? resolveRepName(__rawUser) : __rawUser;
        // Collect write operations first, then commit in <=450-op chunks. A writeBatch caps
        // at 500 ops; with ~540 leads a single batch throws "too large" and the whole push
        // (including the real claim) fails. Chunking is the hard-break safety net (H2).
        const ops = [];
        for (const lead of leads) {
          if (!lead || !lead.id) continue;
          currentIds.add(lead.id);
          // Never push the fictional demo/sample leads into the production cloud.
          if (lead.source === 'sample') continue;
          // Never push soft-deleted leads as live data (H3).
          if (lead._deleted) continue;
          // Stamp _modAt as an ISO string (app-level, survives the round-trip for merge ordering).
          // Prefer the lead's own _modAt (set by saveState at write time); fall back to now.

  // save/merge, so the per-lead merge can tell which side is newer WITHOUT rewriting every
  // lead. __applyingRemote guard: don't re-stamp leads we're currently applying FROM remote.
  try {
    if (!(window.LodgeHelmSync && LodgeHelmSync.__applyingRemote)) {
      const __now = new Date().toISOString();
      // L5: canonicalise the writer so _modBy attribution can't split across name variants.
      const __rawBy = (typeof getCurrentUser === 'function') ? getCurrentUser() : 'Unknown';
      const __by = (typeof resolveRepName === 'function') ? resolveRepName(__rawBy) : __rawBy;
      if (Array.isArray(state.leads)) {
        for (const __l of state.leads) {
          if (!__l || !__l.id) continue;
          if (__l.__remoteStamped) { delete __l.__remoteStamped; __leadHashes.set(__l.id, __leadContentHash(__l)); continue; }
          const __h = __leadContentHash(__l);
          if (__leadHashes.get(__l.id) !== __h) {
            // Genuinely changed (or brand new) → stamp it as a local edit and remember the hash.
            __l._modAt = __now; __l._modBy = __by;
            __leadHashes.set(__l.id, __leadContentHash(__l));
          }
          // else: untouched — leave existing _modAt/_modBy so pushLeads skips it.
        }
      }
    }
  } catch (_) { /* stamping is best-effort */ }
  try {
    localStorage.setItem('lodgehelm-leads', JSON.stringify(state.leads));
    localStorage.setItem('lodgehelm-filters', JSON.stringify(state.filters));
    localStorage.setItem('lodgehelm-view-prefs', JSON.stringify({
      crmView: state.crmView,
      meetingsView: state.meetingsView,
      activeSection: state.activeSection,
      archiveTab: state.archiveTab
    }));
  } catch (e) {
    console.warn('Failed to save state:', e);
    // If quota exceeded, attempt to strip transient fields and retry
    if (e && e.name === 'QuotaExceededError') {
      try {
        const compact = state.leads.map(l => ({ ...l, activity: (l.activity || []).slice(0, 20) }));
        localStorage.setItem('lodgehelm-leads', JSON.stringify(compact));
      } catch (_) { /* give up silently */ }
    }
  }
  // Push to shared backend — no-op if Firebase isn't configured.
  try { LodgeHelmSync.pushLeads(state.leads); } catch (_) { /* sync is best-effort */ }
}
// loadState pulls persisted leads into state. Returns true iff persisted leads
// were found and applied (even if the array is empty — "empty" is a valid state
// after the user deletes everything and should not be overwritten by seeds).
function loadState() {
  try {
    const saved = localStorage.getItem('lodgehelm-leads');
    if (saved !== null && saved !== undefined && saved !== '') {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed)) {
        // Normalise shape first (C5/H5) so backfill + merge see well-formed leads.
        state.leads = parsed.map(l => normalizeLead(l));
        // OUTAGE-EDIT PROTECTION (C1): edits made while sync was down carry no _modAt. The
        // merge treats empty _modAt as "oldest", so stale cloud copies would overwrite them on
        // first reconnect. Backfill a current-ISO _modAt on every lead missing one and persist
        // it BEFORE startSharedSync subscribes, so offline work wins the merge.
        let __backfilled = false;
        const __now = new Date().toISOString();
        const __by = (typeof getCurrentUser === 'function') ? getCurrentUser() : 'Unknown';
        for (const __l of state.leads) {
          if (__l && __l.id && !(typeof __l._modAt === 'string' && __l._modAt)) {
            __l._modAt = __now;
            if (!__l._modBy) __l._modBy = __by;
            __backfilled = true;
          }
        }
        if (__backfilled) {
          try { localStorage.setItem('lodgehelm-leads', JSON.stringify(state.leads)); } catch (_) {}
        }
        return true;
      }
    }
  } catch (e) { console.warn('Failed to load state:', e); }
  return false;
}
function loadPreferences() {
  try {
    const f = localStorage.getItem('lodgehelm-filters');
    if (f) {
      const parsed = JSON.parse(f);
      // Deep merge so nested filter objects keep their defaults
      if (parsed && typeof parsed === 'object') {
        Object.keys(parsed).forEach(k => {
          if (parsed[k] && typeof parsed[k] === 'object' && state.filters[k]) {
            Object.assign(state.filters[k], parsed[k]);
          } else {
            state.filters[k] = parsed[k];
          }
        });
      }
    }
    const v = localStorage.getItem('lodgehelm-view-prefs');
    if (v) {
      const vp = JSON.parse(v);
      if (vp.crmView) state.crmView = vp.crmView;
      if (vp.meetingsView) state.meetingsView = vp.meetingsView;
      if (vp.activeSection) state.activeSection = vp.activeSection;
      if (vp.archiveTab) state.archiveTab = vp.archiveTab;
    }
  } catch (e) { console.warn('Failed to load preferences:', e); }
}
function resetAllData() {
  if (!confirm('Reset all CRM data to seed data? This will erase all changes.')) return;
  localStorage.removeItem('lodgehelm-leads');
  localStorage.removeItem('lodgehelm-filters');
  localStorage.removeItem('lodgehelm-view-prefs');

}

// ========== OPPORTUNITY SCORE ==========
function getOpportunityScore(lead) {
  let score = 0;
  if (lead.qualification) {
    score += 20; // has qualification data
    if (lead.qualification.weaknessesOpportunities?.trim()) score += 15;
    if (lead.qualification.growthIntent?.trim()) score += 10;
    if (lead.qualification.strategyDesign?.trim()) score += 10;
    if (lead.qualification.experienceDesign?.trim()) score += 10;
    if (lead.qualification.digitalCommerce?.trim()) score += 10;
  }
  if (lead.contacts && lead.contacts.length > 0 && lead.contacts[0].name) score += 10;
  if ((lead.emails && lead.emails.length > 0) || (lead.contacts && lead.contacts.some(c => c.email))) score += 10;
  if ((lead.phones && lead.phones.length > 0) || (lead.contacts && lead.contacts.some(c => c.phone))) score += 5;
  return Math.min(score, 100);
}
function renderScoreBadge(lead) {
  const score = getOpportunityScore(lead);
  const cls = score >= 70 ? 'score-high' : score >= 40 ? 'score-mid' : 'score-low';
  return '<span class="opp-score-badge ' + cls + '" title="Opportunity Score: ' + score + '">' + score + '</span>';
}

// ========== DATA COMPLETENESS (triage by how much we know about a lead) ==========
// Mirrors scripts/organize-leads.mjs — keep rubric in sync.
function getDataCompleteness(lead) {
  const hasEmail = (lead.emails && lead.emails.length > 0) || (lead.contacts && lead.contacts.some(c => c.email));
  const hasPhone = (lead.phones && lead.phones.length > 0) || (lead.contacts && lead.contacts.some(c => c.phone));
  const hasSite = !!(lead.website && lead.website.trim());
  const desc = (lead.description || '').trim();
  const hasDesc = !!desc;
  const fg = lead.firmographics || {};
  const hasSize = !!(fg.employees || fg.revenue || fg.founded);
  const hasContacts = !!(lead.contacts && lead.contacts.some(c => c.name));
  const hasOwner = !!(lead.ownerName && lead.ownerName.trim());
  const hasAngle = !!(((lead.funnelLeak || '').trim()) || ((lead.outreachAngle || '').trim()));
  const hasLoc = !!(lead.country && lead.country.trim());
  let score = 0;
  if (hasEmail) score += 20;
  if (hasPhone) score += 15;
  if (hasSite) score += 10;
  if (hasDesc) score += 10;
  if (desc.length > 120) score += 5;
  if (hasSize) score += 10;
  if (hasContacts) score += 10;
  if (hasOwner) score += 5;
  if (hasAngle) score += 10;
  if (hasLoc) score += 5;
  score = Math.min(score, 100);
  const tier = score >= 65 ? 'rich' : score >= 35 ? 'partial' : 'bare';
  return { score, tier, hasEmail, hasPhone, hasSite, hasDesc, hasSize, hasContacts };
}

// ========== QUALIFICATION RULE (keep in sync with scripts/backfill-qualification.mjs) ==========
// A lead is QUALIFIED when ALL hold:
//  1. Reachable  — email OR phone OR WhatsApp (any channel)
//  2. ICP fit    — country is known (foreign operators included; only blank country fails)
//  3. Decision-maker (two-track) — has a named owner/contact, OR has email + a written outreach angle
function computeQualification(lead) {
  const hasEmail = (lead.emails && lead.emails.length > 0) || !!lead.email || (lead.contacts && lead.contacts.some(c => c.email));
  const hasPhone = (lead.phones && lead.phones.length > 0) || !!lead.phone || (lead.contacts && lead.contacts.some(c => c.phone));
  const hasWhats = !!(lead.whatsapp && String(lead.whatsapp).trim());
  const hasName = !!(lead.ownerName && lead.ownerName.trim()) || (lead.contacts && lead.contacts.some(c => c.name));
  const hasAngle = !!(((lead.funnelLeak || '').trim()) || ((lead.outreachAngle || '').trim()));
  const hasCountry = !!(lead.country && lead.country.trim());

  const reachable = hasEmail || hasPhone || hasWhats;
  const icpFit = hasCountry;
  const decisionMaker = hasName || (hasEmail && hasAngle);
  const qualified = reachable && icpFit && decisionMaker;

  let reason, bankReason = '';
  if (qualified) {
    reason = hasName ? 'Has named contact' : 'Email + outreach angle';
  } else {
    const missing = [];
    if (!reachable) missing.push('no contact channel');
    if (!icpFit) missing.push('country unknown');
    if (!decisionMaker) missing.push('no contact name or angle');
    reason = '';
    bankReason = missing.join(' · ');
  }
  return { qualified, reason, bankReason, reachable, icpFit, decisionMaker };
}
// Short label shown on a lead card explaining its qualified/bank status.
function getQualLabel(lead) {
  if (lead.qualReason && String(lead.qualReason).trim()) {
    return (lead.status === 'unqualified')
      ? { text: 'In bank: ' + lead.qualReason, cls: 'badge-neutral' }
      : { text: 'Qualified: ' + lead.qualReason, cls: 'badge-success' };
  }
  const cq = computeQualification(lead);
  return cq.qualified
    ? { text: 'Qualified: ' + cq.reason, cls: 'badge-success' }
    : { text: 'In bank: ' + cq.bankReason, cls: 'badge-neutral' };
}
function renderDataBadges(lead) {
  const c = getDataCompleteness(lead);
  const chip = (on, icon, label) =>
    `<span class="data-chip${on ? ' on' : ''}" title="${label}: ${on ? 'yes' : 'no'}"><i data-lucide="${icon}" aria-hidden="true"></i></span>`;
  return `<div class="data-chips" aria-label="Data completeness">
    ${chip(c.hasEmail, 'mail', 'Email')}
    ${chip(c.hasPhone, 'phone', 'Phone')}
    ${chip(c.hasSite, 'globe', 'Website')}
    ${chip(c.hasContacts, 'user', 'Named contact')}
    ${chip(c.hasSize, 'bar-chart-2', 'Company size')}
    ${chip(c.hasDesc, 'file-text', 'Description')}
  </div>`;
}

// ========== DEAL VALUE & PIPELINE ==========
const STAGE_PROBABILITY = { 1: 0.05, 2: 0.15, 3: 0.35, 4: 0.50, 5: 0.70, 6: 1.00 };
function getDealValue(lead) {
  if (!lead || !lead.crm) return 0;
  const v = Number(lead.crm.dealValue);
  return Number.isFinite(v) ? v : 1200;
}
function formatMoney(n) {
  const v = Number(n) || 0;
  if (Math.abs(v) >= 1000000) return '£' + (v / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (Math.abs(v) >= 1000) return '£' + Math.round(v / 1000) + 'K';
  return '£' + Math.round(v);
}
function formatMoneyFull(n) {
  const v = Number(n) || 0;
  return '£' + v.toLocaleString('en-GB');
}
function computePipeline(leads) {
  const open = leads.filter(l => l.status === 'crm' && l.crm && l.crm.stage !== 6);
  const won  = leads.filter(l => l.status === 'crm' && l.crm && l.crm.stage === 6);
  const total = open.reduce((s, l) => s + getDealValue(l), 0);
  const closed = won.reduce((s, l) => s + getDealValue(l), 0);
  const weighted = open.reduce((s, l) => s + getDealValue(l) * (STAGE_PROBABILITY[l.crm.stage] || 0), 0);
  return { total, closed, weighted, openCount: open.length, wonCount: won.length };
}

// ========== MAP ==========
// UK city-centroid lookup. Offline-first geocoding — leads are placed by matching
// their (free-text) `address` string against these city names. No API key required.
const GEO_CENTROIDS = {
  'london': [51.5074, -0.1278], 'manchester': [53.4808, -2.2426], 'birmingham': [52.4862, -1.8904],
  'leeds': [53.8008, -1.5491], 'liverpool': [53.4084, -2.9916], 'bristol': [51.4545, -2.5879],
  'sheffield': [53.3811, -1.4701], 'edinburgh': [55.9533, -3.1883], 'glasgow': [55.8642, -4.2518],
  'newcastle': [54.9783, -1.6178], 'nottingham': [52.9548, -1.1581], 'leicester': [52.6369, -1.1398],
  'oxford': [51.7520, -1.2577], 'brighton': [50.8225, -0.1372], 'cardiff': [51.4816, -3.1791],
  'belfast': [54.5973, -5.9301], 'norwich': [52.6309, 1.2974], 'york': [53.9590, -1.0815],
  'cambridge': [52.2053, 0.1218], 'reading': [51.4543, -0.9781], 'southampton': [50.9097, -1.4044],
  'portsmouth': [50.8198, -1.0880], 'coventry': [52.4068, -1.5197], 'hull': [53.7676, -0.3274],
  'plymouth': [50.3755, -4.1427], 'aberdeen': [57.1497, -2.0943], 'dundee': [56.4620, -2.9707],
  'bath': [51.3811, -2.3590], 'exeter': [50.7184, -3.5339], 'milton keynes': [52.0406, -0.7594]
};

// Deterministic hash-based jitter (±~0.06°) so co-located leads don't stack on one pixel.
function geoJitter(seed) {
  let h = 0;
  const s = String(seed || '');
  for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) & 0xffff; }
  const dx = ((h % 100) / 100 - 0.5) * 0.12;
  const dy = (((h >> 5) % 100) / 100 - 0.5) * 0.12;
  return [dx, dy];
}

// Persistent cache for runtime Nominatim lookups (best-effort, never blocks render).
function loadGeoCache() {
  try { return JSON.parse(localStorage.getItem('lodgehelm-geocache') || '{}') || {}; }
  catch (_) { return {}; }
}
function saveGeoCache(cache) {
  try { localStorage.setItem('lodgehelm-geocache', JSON.stringify(cache)); } catch (_) {}
}

// Resolve a [lat,lng] for a lead synchronously from the centroid table, or null.
function geocodeLead(l) {
  if (!l) return null;
  // Explicit coordinates win.
  const lat = Number(l.lat), lng = Number(l.lng);
  if (Number.isFinite(lat) && Number.isFinite(lng) && (lat !== 0 || lng !== 0)) return [lat, lng];
  const addr = (typeof l.address === 'string') ? l.address.trim().toLowerCase() : '';
  if (!addr) return null;
  // Substring match against known city centroids.
  for (const city of Object.keys(GEO_CENTROIDS)) {
    if (addr.includes(city)) {
      const [j1, j2] = geoJitter(l.id || addr);
      return [GEO_CENTROIDS[city][0] + j1, GEO_CENTROIDS[city][1] + j2];
    }
  }
  // Cached runtime (Nominatim) result, if any.
  const cache = loadGeoCache();
  if (cache[addr] && Array.isArray(cache[addr])) {
    const [j1, j2] = geoJitter(l.id || addr);
    return [cache[addr][0] + j1, cache[addr][1] + j2];
  }
  return null;
}

// Optional best-effort runtime geocode for unknown addresses. Never blocks render;
// caches the result and re-renders the map if still visible.
function backfillUnknownLocations(unknownLeads) {
  if (!Array.isArray(unknownLeads) || !unknownLeads.length) return;
  const cache = loadGeoCache();
  // Only attempt addresses we have text for and haven't cached/failed before.
  const todo = [];
  const seen = new Set();
  for (const l of unknownLeads) {
    const addr = (typeof l.address === 'string') ? l.address.trim() : '';
    if (!addr) continue;
    const key = addr.toLowerCase();
    if (cache[key] !== undefined || seen.has(key)) continue;
    seen.add(key);
    todo.push(key);
  }
  if (!todo.length) return;
  // Throttle: one lookup per render cycle to respect Nominatim usage policy.
  const key = todo[0];
  fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=gb&q=' + encodeURIComponent(key))
    .then(r => r.ok ? r.json() : [])
    .then(arr => {
      const c = loadGeoCache();
      if (Array.isArray(arr) && arr.length && arr[0].lat && arr[0].lon) {
        c[key] = [Number(arr[0].lat), Number(arr[0].lon)];
      } else {
        c[key] = null; // mark as attempted to avoid re-querying
      }
      saveGeoCache(c);
      if (state.activeSection === 'map') renderMap();
    })
    .catch(() => {});
}

// Distinct colours per lead status. Reuse theme tokens where sensible.
function leadStatusColor(status) {
  switch (status) {
    case 'crm': return '#01696f';        // teal — in active outreach
    case 'qualified': return '#437a22';  // green — qualified
    case 'lead': return '#006494';       // blue
    case 'new': return '#d19900';        // gold
    case 'archive': return '#7a7974';    // grey — archived/backlog
    case 'unqualified': default: return '#964219'; // warning brown
  }
}
function leadStatusLabel(status) {
  switch (status) {
    case 'crm': return 'CRM / Outreach';
    case 'qualified': return 'Qualified';
    case 'lead': return 'Lead';
    case 'new': return 'New';
    case 'archive': return 'Archive';
    case 'unqualified': return 'Unqualified';
    default: return status || 'Unknown';
  }
}

      </div>
      <aside style="flex:0 1 280px;min-width:240px;display:flex;flex-direction:column;border:1px solid var(--color-border);border-radius:var(--radius-md);overflow:hidden;max-height:560px;">
        <div style="padding:10px 12px;border-bottom:1px solid var(--color-border);background:var(--color-surface-offset);font-weight:600;font-size:var(--text-sm);">
          Undisclosed location (${undisclosed.length})
        </div>
        <div style="overflow-y:auto;">${undisclosedListHtml}</div>
      </aside>
    </div>
  `;

  // Destroy any prior instance before reusing the container.
  if (__lodgehelmMap) { try { __lodgehelmMap.remove(); } catch (_) {} __lodgehelmMap = null; }

  if (!leafletReady) return;

  const mapEl = document.getElementById('lodgehelm-leaflet-map');
  if (!mapEl) return;

  const map = window.L.map(mapEl, { scrollWheelZoom: true });
  __lodgehelmMap = map;
  window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const markers = [];
  located.forEach(({ lead, pt }) => {
    const color = leadStatusColor(lead.status);
    const m = window.L.circleMarker(pt, {
      radius: 7, color: '#fff', weight: 1.5, fillColor: color, fillOpacity: 0.85
    });
    const name = escapeHtml(lead.businessName || 'Unnamed lead');
    const statusLabel = escapeHtml(leadStatusLabel(lead.status));
    // Single-user mode: no assignment/claim info in map popup
    m.bindPopup(`<strong>${name}</strong><br>Status: ${statusLabel}`);
    m.on('click', () => { try { openPanel('view-lead', getLeadById(lead.id)); } catch (_) {} });
    m.addTo(map);
    markers.push(m);
  });

  if (markers.length) {
    const group = window.L.featureGroup(markers);
    try { map.fitBounds(group.getBounds().pad(0.2)); }
    catch (e) { map.setView([54.0, -2.5], 6); }
  } else {
    map.setView([54.0, -2.5], 5); // default: UK overview
  }

  // Leaflet needs a size recalculation once the (previously hidden) container is laid out.
  setTimeout(() => { try { map.invalidateSize(); } catch (e) {} }, 60);

  // Best-effort runtime geocoding for unknown addresses (non-blocking).
  try { backfillUnknownLocations(undisclosed); } catch (_) {}
}

// ========== SIDEBAR BADGES ==========
function renderSidebarBadges() {
  const leadBankCount = state.leads.filter(l => l.status === 'unqualified').length;
  const qualCount = state.leads.filter(l => l.status === 'qualified' || l.status === 'crm').length;
  const crmCount = state.leads.filter(l => l.status === 'crm').length;
  const meetCount = state.leads.filter(l => l.status === 'crm' && l.crm && l.crm.meetingBooked).length;
  const archCount = state.leads.filter(l => l.status === 'archive').length;

  const overdueInCRM = state.leads.filter(l => l.status === 'crm' && l.crm && l.crm.followUpDate && daysUntil(l.crm.followUpDate) !== null && daysUntil(l.crm.followUpDate) <= 0).length;

  document.getElementById('badge-lead-bank').textContent = leadBankCount;
  document.getElementById('badge-qualified').textContent = qualCount;

  // Call List badge = leads ready to call (Bank + Qualified, with a phone, not yet contacted)
  const callListCount = state.leads.filter(l =>
    (l.status === 'unqualified' || l.status === 'qualified') &&
    ((l.phones && l.phones.length > 0) || (l.contacts && l.contacts.some(c => c.phone))) &&
    !(l.crm && l.crm.dateLastContact)
  ).length;
  const callListBadge = document.getElementById('badge-call-list');
  if (callListBadge) callListBadge.textContent = callListCount;

  const crmBadge = document.getElementById('badge-crm');
  if (overdueInCRM > 0) {
    crmBadge.textContent = crmCount;
    crmBadge.className = 'nav-badge nav-badge-warning';
    crmBadge.title = overdueInCRM + ' overdue follow-up' + (overdueInCRM !== 1 ? 's' : '');
  } else {
    crmBadge.textContent = crmCount;
    crmBadge.className = 'nav-badge nav-badge-teal';
    crmBadge.title = crmCount + ' lead' + (crmCount !== 1 ? 's' : '') + ' in CRM';
  }
  document.getElementById('badge-meetings').textContent = meetCount;
  document.getElementById('badge-archive').textContent = archCount;
}

// ========== PANEL & MODAL ==========
function openPanel(type, data) {
  state.panelOpen = true;
  state.panelTrigger = document.activeElement;
  const panel = document.getElementById('side-panel');
  const overlay = document.getElementById('panel-overlay');
  const content = document.getElementById('panel-content');

  if (type === 'add-lead') {
    content.innerHTML = renderAddLeadForm();
  } else if (type === 'view-lead') {
    content.innerHTML = renderViewLeadPanel(data);
  } else if (type === 'view-qualification') {
    content.innerHTML = renderViewQualificationPanel(data);
  }

  panel.classList.add('active');
  overlay.classList.add('active');
  overlay.setAttribute('aria-hidden', 'false');
  lucide.createIcons({ nodes: [content] });

  // Focus first focusable
  setTimeout(() => {
    const first = panel.querySelector('input, textarea, select, button');
    if (first) first.focus();
  }, 260);
}
function closePanel() {
  state.panelOpen = false;
  document.getElementById('side-panel').classList.remove('active');
  document.getElementById('panel-overlay').classList.remove('active');
  document.getElementById('panel-overlay').setAttribute('aria-hidden', 'true');
  if (state.panelTrigger) {
    state.panelTrigger.focus();
    state.panelTrigger = null;
  }
}
function openModal(type, data) {
  state.modalOpen = true;
  state.modalTrigger = document.activeElement;

  if (type === 'qualify') {

  lucide.createIcons({ nodes: [content] });

  setTimeout(() => {
