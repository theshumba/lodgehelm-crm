    if (first) first.focus();
  }, 210);
}
function closeModal() {
  state.modalOpen = false;
  document.getElementById('modal-overlay').classList.remove('active');
  document.getElementById('modal-overlay').setAttribute('aria-hidden', 'true');
  if (state.modalTrigger) {
    state.modalTrigger.focus();
    state.modalTrigger = null;
  }
}

// ========== RENDER: TODAY / DAILY WORKLIST ==========
function renderToday() {
  const container = document.getElementById('today-content');
  if (!container) return;

  const allLeads = state.leads || [];

  // Group 1: Follow-ups due (followUpDate set, daysUntil <= 0, not Won/Lost)
  const followUpsDue = allLeads.filter(l => {
    if (!l.crm || !l.crm.followUpDate) return false;
    const d = daysUntil(l.crm.followUpDate);
    if (d === null || d > 0) return false;
    if (l.crm.stage === 6) return false; // Won
    const disp = l.crm.disposition || '';
    if (disp === 'not_interested' || disp === 'archived') return false;
    return true;
  });

  // Group 2: Callbacks / meetings today (isTodayLead)
  const callbacksToday = allLeads.filter(l => isTodayLead(l));

  // Group 3: Not yet contacted — stage <= 2, no activity, capped at 25, sorted segment then name
  const notContacted = allLeads
    .filter(l => l.crm && l.crm.stage <= 2 && (!l.activity || l.activity.length === 0))
    .sort((a, b) => {
      const segA = (a.segment || '').toLowerCase();
      const segB = (b.segment || '').toLowerCase();
      if (segA < segB) return -1;
      if (segA > segB) return 1;
      return (a.businessName || '').localeCompare(b.businessName || '');
    })
    .slice(0, 25);

  // Update badge
  const badgeEl = document.getElementById('badge-today');
  const totalActionable = followUpsDue.length + callbacksToday.length;
  if (badgeEl) {
    if (totalActionable > 0) {
      badgeEl.textContent = totalActionable;
      badgeEl.style.display = '';
    } else {
      badgeEl.style.display = 'none';
    }
  }

  function renderTodayRow(l) {
    const primaryPhone = (l.phones && l.phones[0] && l.phones[0].number) || '';
    const phoneEl = primaryPhone
      ? `<a href="tel:${escapeHtml(primaryPhone.replace(/[^+0-9]/g, ''))}" class="today-phone-link" aria-label="Call ${escapeHtml(l.businessName)}"><i data-lucide="phone" aria-hidden="true"></i>${escapeHtml(primaryPhone)}</a>`
      : `<span class="today-no-phone">No phone</span>`;
    const segBadge = l.segment ? `<span class="badge badge-neutral">${escapeHtml(l.segment)}</span>` : '';
    const stageBadge = l.crm ? `<span class="badge ${getStageBadge(l.crm.stage)}">${getStageName(l.crm.stage)}</span>` : '';
    const country = l.country ? `<span class="today-country">${escapeHtml(l.country)}</span>` : '';
    const waBtn = waLink(l) ? `<button class="btn btn-sm" style="background:#25D366;color:white;display:inline-flex;align-items:center;gap:4px;font-size:var(--text-xs);min-height:28px;padding:2px var(--space-2);" data-action="whatsapp-lead" data-id="${escapeHtml(l.id)}"><i data-lucide="message-circle" style="width:13px;height:13px;" aria-hidden="true"></i> WA</button>` : '';
    return `
      <div class="today-row card" style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);flex-wrap:wrap;">
        <div style="flex:1;min-width:0;">
          <button class="btn btn-ghost" style="font-weight:600;padding:0;text-align:left;font-size:var(--text-sm);" data-action="view-lead" data-id="${escapeHtml(l.id)}">${escapeHtml(l.businessName || 'Unnamed')}</button>
          <div style="display:flex;align-items:center;gap:var(--space-2);margin-top:var(--space-1);flex-wrap:wrap;">
            ${segBadge}${stageBadge}${country}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;">
          ${phoneEl}
          ${waBtn}
          <select class="form-select call-outcome-select" data-action="log-call" data-id="${escapeHtml(l.id)}" aria-label="Log call outcome for ${escapeHtml(l.businessName)}" style="font-size:var(--text-xs);min-width:160px;">
            <option value="" selected>Log call…</option>
            ${CALL_OUTCOMES.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}
          </select>
        </div>
      </div>`;
  }

  function renderGroup(title, icon, leads, emptyMsg) {
    return `
      <div class="today-group" style="margin-bottom:var(--space-6);">
        <h3 style="font-size:var(--text-sm);font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:var(--space-3);display:flex;align-items:center;gap:var(--space-2);">
          <i data-lucide="${icon}" aria-hidden="true" style="width:15px;height:15px;"></i>
          ${title}
          <span style="font-size:var(--text-xs);font-weight:400;color:var(--color-text-faint);">(${leads.length})</span>
        </h3>
        ${leads.length > 0
          ? leads.map(renderTodayRow).join('')
          : `<p style="color:var(--color-text-faint);font-size:var(--text-sm);padding:var(--space-2) 0;">${emptyMsg}</p>`}
      </div>`;
  }

  container.innerHTML = `
    <div class="page-header" style="padding:var(--space-5) var(--space-6) var(--space-4);">
      <h1 class="page-title">Today</h1>
      <p class="page-subtitle" style="margin-top:var(--space-1);">Your daily worklist — ${new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' })}</p>
    </div>
    <div style="padding:0 var(--space-6) var(--space-6);">
      ${renderGroup('Follow-ups Due', 'alarm-clock', followUpsDue, 'No overdue follow-ups.')}
      ${renderGroup('Callbacks &amp; Meetings Today', 'phone-incoming', callbacksToday, 'Nothing scheduled for today.')}
      ${renderGroup('Not Yet Contacted', 'user-plus', notContacted, 'All leads have been contacted.')}
    </div>`;

  lucide.createIcons({ nodes: [container] });
}

// ========== RENDER: HOME / DASHBOARD ==========
function renderHome() {
  const container = document.getElementById('home-content');
  if (!container) return;
  const user = getCurrentUser();
  const firstName = (user || 'there').split(' ')[0];
  const now = new Date();
  const hour = now.getHours();
  const greet = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateLine = `${dayNames[now.getDay()]}, ${now.getDate()} ${monthNames[now.getMonth()]} ${now.getFullYear()}`;

  const isAggregate = isMasterUser() || CEOS.includes(user);
  const myLeads = isAggregate ? state.leads : state.leads.filter(l => l.assignedTo === user);

  // Pipeline for my leads
  const myPipeline = computePipeline(myLeads);

  // Meetings this week
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay());
  startOfWeek.setHours(0,0,0,0);
  const endOfWeek = new Date(startOfWeek);
  endOfWeek.setDate(startOfWeek.getDate() + 7);
  const meetingsThisWeek = myLeads.filter(l => {
    if (!l.crm || !l.crm.meetingBooked || !l.crm.meetingDate) return false;
    const md = new Date(l.crm.meetingDate);
    return md >= startOfWeek && md < endOfWeek;
  });

  // Follow-ups due today (and overdue)
  const followUpsToday = myLeads.filter(l => l.crm && l.crm.followUpDate && daysUntil(l.crm.followUpDate) === 0);
  const overdueFollowUps = myLeads.filter(l => l.crm && l.crm.followUpDate && daysUntil(l.crm.followUpDate) !== null && daysUntil(l.crm.followUpDate) < 0);
  const meetingsToday = myLeads.filter(l => l.crm && l.crm.meetingBooked && l.crm.meetingDate && isTodayISO(l.crm.meetingDate));

  // New responses: leads with activity in last 2 days (that isn't your own)
  const twoDaysAgo = Date.now() - 2 * 86400000;
  const newResponses = myLeads.filter(l => (l.activity || []).some(a => new Date(a.date).getTime() >= twoDaysAgo));

  // Top 3 opportunity score leads not yet contacted
  const topOpps = [...myLeads]
    .filter(l => l.status === 'crm' && l.crm && !l.crm.dateFirstContact && getOpportunityScore(l) >= 70)
    .sort((a, b) => getOpportunityScore(b) - getOpportunityScore(a))
    .slice(0, 3);

  const priorities = [];
  overdueFollowUps.slice(0, 5).forEach(l => priorities.push({ type: 'overdue', lead: l, label: 'Overdue follow-up', meta: `${Math.abs(daysUntil(l.crm.followUpDate))} days overdue` }));
  followUpsToday.forEach(l => priorities.push({ type: 'today', lead: l, label: 'Follow-up today', meta: 'Due today' }));
  meetingsToday.forEach(l => priorities.push({ type: 'today', lead: l, label: 'Meeting today', meta: formatDateTime(l.crm.meetingDate) }));
  topOpps.forEach(l => priorities.push({ type: 'opportunity', lead: l, label: 'High-score opportunity', meta: `Score ${getOpportunityScore(l)} &middot; not contacted` }));

  // Recent activity relevant to user
  const recentActivity = [];
  myLeads.forEach(l => {
    (l.activity || []).forEach(a => {
      if (isAggregate || a.by === user || l.assignedTo === user) {
        recentActivity.push({ ...a, leadName: l.businessName, leadId: l.id });
      }
    });
  });
  recentActivity.sort((a, b) => new Date(b.date) - new Date(a.date));
  const recent = recentActivity.slice(0, 5);

  const pipelineLabel = isAggregate ? 'Team pipeline' : 'Your pipeline';
  const meetingsLabel = isAggregate ? 'Team meetings this week' : 'Meetings this week';
  const followUpLabel = isAggregate ? 'Team follow-ups due' : 'Follow-ups due today';
  const respLabel = isAggregate ? 'Team responses (48h)' : 'New responses (48h)';

  const html = `
    <div class="home-greeting">
      <h1>${greet}, ${escapeHtml(firstName)}.</h1>
      <p>It's ${dateLine}.</p>
    </div>
    <div class="home-stats">
      <div class="home-stat-card accent">
        <div class="stat-label">${pipelineLabel}</div>
        <div class="stat-value">${formatMoney(myPipeline.total)}</div>
      </div>
      <div class="home-stat-card">
        <div class="stat-label">${meetingsLabel}</div>
        <div class="stat-value">${meetingsThisWeek.length}</div>
      </div>
      <div class="home-stat-card">
        <div class="stat-label">${followUpLabel}</div>
        <div class="stat-value">${followUpsToday.length + overdueFollowUps.length}</div>
      </div>
      <div class="home-stat-card">
        <div class="stat-label">${respLabel}</div>
        <div class="stat-value">${newResponses.length}</div>
      </div>
    </div>
    <div class="home-columns">
      <div>
        <h2 class="home-section-title">Today's priorities</h2>
        ${priorities.length === 0 ? `<div class="priority-item"><div><div class="pi-title">Inbox zero</div><div class="pi-meta">No overdue items, no meetings today, no urgent follow-ups.</div></div></div>` : `
        <div class="priority-list">
          ${priorities.slice(0, 12).map(p => `
            <div class="priority-item ${p.type}" data-action="home-goto-lead" data-id="${p.lead.id}" role="button" tabindex="0">
              <div>
                <div class="pi-title">${escapeHtml(p.lead.businessName)} &middot; ${p.label}</div>
                <div class="pi-meta">${p.meta}</div>
              </div>
              <div class="pi-spacer"></div>
              <button class="btn btn-primary btn-sm" data-action="home-contact-lead" data-id="${p.lead.id}">${p.type === 'today' && p.label === 'Meeting today' ? 'Open' : 'Contact Now'}</button>
            </div>
          `).join('')}
        </div>`}
      </div>
      <div>
        <h2 class="home-section-title">Recent activity</h2>
        ${recent.length === 0 ? `<div class="recent-activity-item">No recent activity yet.</div>` : `
        <div class="recent-activity-feed">
          ${recent.map(a => `
            <div class="recent-activity-item">
              <div><strong>${escapeHtml(a.by)}</strong> ${escapeHtml(a.action)} &mdash; ${escapeHtml(a.leadName)}</div>
              <div class="ra-meta">${formatTimeAgo(a.date)}</div>
            </div>
          `).join('')}
        </div>`}
      </div>
    </div>
  `;
  container.innerHTML = html;
  lucide.createIcons({ nodes: [container] });
}

  if (leads.length === 0) {

      </div>
    `;
  } else {
    html += '<div class="lead-grid">';
    leads.forEach(l => {
      const sb = STATUS_BADGES[l.status];
      const pc = getPrimaryContact(l);
      const lbSelected = (state.bulkSelection || []).includes(l.id) && state.bulkScope === 'lead-bank';
      html += `

            <div style="display:flex;align-items:center;gap:var(--space-2);">
              ${renderScoreBadge(l)}
              <span class="badge ${sb.cls}">${sb.label}</span>

            <button class="btn btn-primary btn-sm" data-action="qualify" data-id="${l.id}"><i data-lucide="check-circle" aria-hidden="true"></i> Force-qualify</button>

            <button class="btn btn-ghost btn-sm" data-action="generate-email" data-id="${l.id}"><i data-lucide="mail" aria-hidden="true"></i> Draft</button>

// ========== RENDER: CALL LIST (ranked cold-call queue) ==========
// A phone-first prospecting queue. Every callable lead is ranked by DATA COMPLETENESS
// (getDataCompleteness score, 0-100) descending — i.e. the leads we know the most about
// sit at the top. That is the "more detail / more information = higher priority" rule:
// a richer lead is a warmer, better-researched call. Work top-down from #1.
function getCallList() {
  const f = state.filters.callList || { cohort: 'ready', hideCalled: false };
  const hasPhone = l => (l.phones && l.phones.length > 0) || (l.contacts && l.contacts.some(c => c.phone));
  let leads = state.leads.filter(l => l.status !== 'archive' && hasPhone(l));
  if (f.cohort === 'ready') leads = leads.filter(l => l.status === 'unqualified' || l.status === 'qualified');
  else if (f.cohort === 'qualified') leads = leads.filter(l => l.status === 'qualified');
  else if (f.cohort === 'bank') leads = leads.filter(l => l.status === 'unqualified');
  // 'all' = every non-archived callable lead (includes those already in CRM)
  if (f.hideCalled) leads = leads.filter(l => !(l.crm && l.crm.dateLastContact));
  leads.sort((a, b) => {
    const d = getDataCompleteness(b).score - getDataCompleteness(a).score;
    if (d !== 0) return d;
    const o = getOpportunityScore(b) - getOpportunityScore(a);
    if (o !== 0) return o;
    return (a.businessName || '').localeCompare(b.businessName || '');
  });
  return leads;
}

// ========== RENDER: CRM ==========
function renderCRM() {
  const container = document.getElementById('crm-content');
  const f = state.filters.crm;
  let leads = state.leads.filter(l => l.status === 'crm');
  const totalCount = leads.length;

  if (f.search) {
    const s = f.search.toLowerCase();
    leads = leads.filter(l =>
      l.businessName.toLowerCase().includes(s) ||
      l.contacts.some(c => c.name.toLowerCase().includes(s))
    );
  }
  if (f.stage !== 'all') leads = leads.filter(l => l.crm && l.crm.stage === parseInt(f.stage));
  if (f.priority !== 'all') leads = leads.filter(l => l.crm && l.crm.priority === f.priority);
  if (f.overdueOnly) leads = leads.filter(l => l.crm && l.crm.followUpDate && daysUntil(l.crm.followUpDate) !== null && daysUntil(l.crm.followUpDate) <= 0);
  if (f.today) leads = leads.filter(l => isTodayLead(l));
  if (f.assignedTo !== 'all') leads = leads.filter(l => l.assignedTo === f.assignedTo);

  // Pipeline values across the full CRM cohort (not just filtered)
  const pipeLeads = state.leads.filter(l => l.status === 'crm');
  const pipe = computePipeline(pipeLeads);

  let html = `
    <div class="section-header">
      <h1>CRM / Outreach</h1>
      <div class="view-toggle">
        <button class="view-toggle-btn ${state.crmView === 'list' ? 'active' : ''}" data-action="crm-view" data-view="list" aria-label="List view"><i data-lucide="list" aria-hidden="true"></i> List</button>
        <button class="view-toggle-btn ${state.crmView === 'board' ? 'active' : ''}" data-action="crm-view" data-view="board" aria-label="Board view"><i data-lucide="columns-3" aria-hidden="true"></i> Board</button>
      </div>
    </div>
    <div class="pipeline-bar">
      <div class="pipeline-stat"><span class="pipeline-stat-value">${formatMoney(pipe.total)}</span><span class="pipeline-stat-label">pipeline</span></div>
      <span class="pipeline-sep">&middot;</span>
      <div class="pipeline-stat"><span class="pipeline-stat-value">${formatMoney(pipe.closed)}</span><span class="pipeline-stat-label">closed</span></div>
      <span class="pipeline-sep">&middot;</span>
      <div class="pipeline-stat"><span class="pipeline-stat-value">${formatMoney(pipe.weighted)}</span><span class="pipeline-stat-label">weighted forecast</span></div>
      <div class="pipeline-meta">${pipe.openCount} open &middot; ${pipe.wonCount} won</div>
    </div>
    <div class="filter-bar">
      <input type="text" class="form-input" placeholder="Search by name or contact..." value="${escapeHtml(f.search)}" data-filter="crm-search" aria-label="Search CRM">
      <select class="form-select" data-filter="crm-stage" aria-label="Filter by stage">
        <option value="all"${f.stage==='all'?' selected':''}>All Stages</option>
        ${STAGES.map(s => `<option value="${s.num}"${f.stage==String(s.num)?' selected':''}>${s.name}</option>`).join('')}
      </select>
      <select class="form-select" data-filter="crm-priority" aria-label="Filter by priority">
        <option value="all"${f.priority==='all'?' selected':''}>All Priorities</option>
        <option value="high"${f.priority==='high'?' selected':''}>High</option>
        <option value="medium"${f.priority==='medium'?' selected':''}>Medium</option>
        <option value="low"${f.priority==='low'?' selected':''}>Low</option>
      </select>
      <!-- Single-user mode: assigned-to filter hidden -->
      <button class="today-chip${f.today ? ' active' : ''}" data-action="toggle-today-filter" data-scope="crm" aria-pressed="${!!f.today}"><i data-lucide="calendar-clock" aria-hidden="true"></i> Today</button>
      <label class="overdue-check">
        <input type="checkbox" data-filter="crm-overdue" ${f.overdueOnly ? 'checked' : ''}>
        <span>Overdue only</span>
      </label>
      <select class="form-select" data-filter="crm-sort" aria-label="Sort leads">
        <option value="score"${(state.filters.crm.sort||'score')==='score'?' selected':''}>Sort by Score</option>
        <option value="date"${state.filters.crm.sort==='date'?' selected':''}>Sort by Date</option>
        <option value="name"${state.filters.crm.sort==='name'?' selected':''}>Sort by Name</option>
      </select>
      ${isConsultant() ? `<label class="consultant-view-toggle"><input type="checkbox" data-filter="crm-show-all" ${f.assignedTo==='all'?'checked':''}> Show all leads</label>` : ''}
      <span class="count-label">Showing ${leads.length} of ${totalCount}</span>
    </div>
    <div class="bulk-bar${(state.bulkSelection && state.bulkSelection.length) ? ' active' : ''}" id="bulk-bar-crm">
      <span class="bulk-count">${(state.bulkSelection || []).length} selected</span>
      <select class="form-select bulk-action-select" data-action="bulk-action" data-scope="crm" aria-label="Bulk action">
        <option value="">Choose action...</option>
        ${canReassignLeads() ? '<optgroup label="Reassign to">' + CONSULTANTS.map(c => `<option value="reassign:${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('') + '</optgroup>' : ''}
        <optgroup label="Move to stage">${STAGES.map(s => `<option value="stage:${s.num}">${s.name}</option>`).join('')}</optgroup>
        <option value="archive">Archive</option>
        <option value="delete">Delete</option>
      </select>
      <button class="btn btn-ghost btn-sm" data-action="bulk-clear">Clear selection</button>
    </div>
  `;

  // Apply sorting (default: by score descending)
  const crmSort = state.filters.crm.sort || 'score';
  if (crmSort === 'score') leads.sort((a, b) => getOpportunityScore(b) - getOpportunityScore(a));
  else if (crmSort === 'name') leads.sort((a, b) => a.businessName.localeCompare(b.businessName));

  if (state.crmView === 'list') {
    html += renderCRMList(leads);
  } else {
    html += renderCRMBoard(leads);
  }

  container.innerHTML = html;
  lucide.createIcons({ nodes: [container] });

  // Kanban drag-and-drop
  if (state.crmView === 'board') initKanbanDrag();
}

const RESEARCH_ITEMS = [
  'Visited website (desktop)',
  'Checked mobile experience',
  'Reviewed Google reviews',
  'Checked Instagram/social media',
  'Noted 2-3 specific observations',
  'Identified primary gap',
  'Identified which service line fits'
];
function renderResearchChecklist(lead) {
  if (!lead.researchChecklist) lead.researchChecklist = [];
  const items = RESEARCH_ITEMS.map((label, i) => {
    const checked = lead.researchChecklist.includes(i);
    return `<label><input type="checkbox" data-action="research-check" data-id="${lead.id}" data-index="${i}" ${checked ? 'checked' : ''}> ${escapeHtml(label)}</label>`;
  }).join('');
  const done = lead.researchChecklist.length;
  const total = RESEARCH_ITEMS.length;
  return `<div class="research-checklist"><h4>Research Checklist (${done}/${total})</h4>${items}</div>`;
}

  let html = '<div class="kanban-board">';

    html += `

          <span class="kanban-column-title">${stage.name}</span>
          <span class="kanban-column-count">${stageLeads.length}</span>
        </div>
        <div class="kanban-cards" data-stage="${stage.num}">
          ${stageLeads.map(l => {
            const pc = getPrimaryContact(l);
            const crm = l.crm;

              </div>
            `;
          }).join('')}
          <div class="kanban-drop-zone"></div>

}

function initKanbanDrag() {
  let draggedId = null;
  document.querySelectorAll('.kanban-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      draggedId = card.dataset.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over'));
    });
  });
  document.querySelectorAll('.kanban-cards').forEach(col => {
    col.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.closest('.kanban-column').classList.add('drag-over');
    });
    col.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) {
        col.closest('.kanban-column').classList.remove('drag-over');
      }
    });
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.closest('.kanban-column').classList.remove('drag-over');
      const newStage = parseInt(col.dataset.stage);
      if (draggedId && newStage) {
        const lead = getLeadById(draggedId);
        if (lead && lead.crm) {
          lead.crm.stage = newStage;
          lead.crm.dateLastContact = todayISO;
          addActivity(lead, 'changed stage to ' + getStageName(newStage));
          saveState();
          showToast(`${lead.businessName} moved to ${getStageName(newStage)}`, 'info');
          renderCRM();
          renderSidebarBadges();
        }
      }
      draggedId = null;
    });
  });
}

// ========== EMAIL GENERATION ==========
// Segment drives the value-prop line; falls back to small_lodge.
function getEmailTemplate(lead) {
  const seg = (lead.segment || '').toLowerCase();
  if (['small_lodge','large_collection','small_operator','large_operator','phone_only'].includes(seg)) return seg;
  return 'small_lodge';
}

// Personalisation line built from the lead's hand-written outreach angle / funnel leak.
// Returns '' when we have nothing specific (the email then reads cleanly without it).
function getAngleLine(lead) {
  const angle = (lead.outreachAngle || '').trim();
  if (angle.length > 5) {
    const first = angle.split('\n')[0].replace(/^[-*\s]+/, '').trim();
    return first.charAt(0).toUpperCase() + first.slice(1) + (/[.!?]$/.test(first) ? '' : '.');
  }
  const leak = (lead.funnelLeak || '').trim();
  if (leak.length > 5) {
    const first = leak.split('\n')[0].replace(/^[-*\s]+/, '').trim();
    return 'I noticed ' + first.charAt(0).toLowerCase() + first.slice(1) + (/[.!?]$/.test(first) ? '' : '.');
  }
  return '';
}

function generateEmail(lead) {
  const contactName = (lead.ownerName && lead.ownerName.trim().split(' ')[0])
    || (getPrimaryContact(lead) && getPrimaryContact(lead).name && getPrimaryContact(lead).name.split(' ')[0])
    || 'there';
  const biz = lead.businessName;
  const angle = getAngleLine(lead);
  const seg = getEmailTemplate(lead);
  const sign = 'Melusi\nLodgeHelm\nlodgehelm.app';

  // Why-it-matters line, tailored to segment.
  const valueProp = {
    small_lodge: 'When you\'re out with guests, booking enquiries can sit for hours before anyone replies — and that\'s often where a booking quietly slips away.',
    large_collection: 'Across a collection like ' + biz + ', even a few-hour delay on enquiries quietly costs bookings at your busiest camps.',
    small_operator: 'In safari, the operator who sends the first solid quote usually wins it — speed of reply matters more than almost anything.',
    large_operator: 'At ' + biz + '\'s enquiry volume, nights, weekends and time-zones are where bookings quietly leak.',
    phone_only: 'A few booking enquiries always slip past when you\'re on a game drive or off-grid.'
  }[seg];

  const opener = angle ? (angle + '\n\n') : '';
  const subject = 'Quick one about ' + biz;
  const email = {
    subject,
    body: 'Hi ' + contactName + ',\n\nI came across ' + biz + ' and wanted to reach out. ' + opener
      + valueProp + '\n\n'
      + 'I built LodgeHelm to catch every booking enquiry and reply instantly, 24/7 — so fewer slip away and more turn into confirmed bookings.\n\n'
      + 'Happy to show you a 2-minute example using your own enquiry flow. Worth a look?\n\nRegards,\n' + sign
  };

  const followUp = {
    subject: 'Re: ' + subject,
    body: 'Hi ' + contactName + ',\n\nJust following up on my note about ' + biz + '.\n\n'
      + 'If catching booking enquiries faster is useful, I can send a short demo — no obligation. No worries at all if the timing isn\'t right.\n\nRegards,\n' + sign
  };

  const linkedin = 'Hi ' + contactName + ', I came across ' + biz + '. I help safari lodges and operators catch booking enquiries instantly so fewer slip away on evenings and weekends. Open to a quick look?';

  return { email, followUp, linkedin };
}

// Generate a bespoke outreach email for ONE lead via Gemini (reuses the chatbot's key).
// Returns the raw text ("Subject: ...\n\n<body>"), or null on error / no key.
async function generateAIDraft(lead) {
  const apiKey = (typeof getApiKey === 'function') ? getApiKey() : '';
  if (!apiKey) {
    showToast('Add your Gemini API key in the chat (bottom-right) → Settings', 'warning');
    const panel = document.getElementById('chat-panel');
    if (panel) { panel.classList.add('open'); if (typeof loadChatState === 'function') loadChatState(); if (typeof switchChatView === 'function') switchChatView('settings'); }
    return null;
  }
  const sys = `You are Melusi, founder of LodgeHelm. You write short, warm, genuine cold-outreach emails to safari lodges and tour operators in Africa.
LodgeHelm is software that catches every booking enquiry and replies instantly, 24/7, so fewer enquiries slip away and more become confirmed bookings (the promise is "from enquiry to confirmed booking").
Rules:
- Under 140 words. Plain English. No buzzwords, no hype, no exclamation marks.
- Never use the word "free".
- Open with something specific to THIS business (use its outreach angle / funnel leak if given) rather than a generic compliment.
- Exactly one soft call to action: offer a 2-minute example using their own enquiry flow.
- Sign exactly: Melusi\nLodgeHelm
Return EXACTLY in this format and nothing else:
Subject: <subject line>

<email body>`;
  const profile = {
    business: lead.businessName, segment: lead.segment, country: lead.country,
    website: lead.website, owner: lead.ownerName || null, description: lead.description || null,
    outreachAngle: lead.outreachAngle || null, funnelLeak: lead.funnelLeak || null
  };
  try {
    const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + encodeURIComponent(apiKey), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ role: 'user', parts: [{ text: 'Write the outreach email for this lead:\n' + JSON.stringify(profile, null, 2) }] }],
        systemInstruction: { parts: [{ text: sys }] },
        generationConfig: { temperature: 0.8, maxOutputTokens: 512 }
      })
    });
    if (!resp.ok) { const e = await resp.json().catch(() => ({})); showToast('AI error: ' + (e.error?.message || resp.status), 'error'); return null; }
    const data = await resp.json();
    return (data.candidates?.[0]?.content?.parts?.[0]?.text || '').trim() || null;
  } catch (e) {
    showToast('AI connection error: ' + e.message, 'error');
    return null;
  }
}

function renderMeetingsList(leads, now) {
  const sorted = [...leads].sort((a, b) => {
    const aDate = a.crm.meetingDate ? new Date(a.crm.meetingDate) : new Date(9999, 0);
    const bDate = b.crm.meetingDate ? new Date(b.crm.meetingDate) : new Date(9999, 0);
    return aDate - bDate;
  });
  const upcoming = sorted.filter(l => l.crm.meetingDate && new Date(l.crm.meetingDate) >= now);
  const past = sorted.filter(l => l.crm.meetingDate && new Date(l.crm.meetingDate) < now);

  let html = '<div style="display:flex;flex-direction:column;gap:var(--space-4);">';

  if (upcoming.length) {
    html += '<h3 style="font-family:var(--font-display);font-weight:600;font-size:var(--text-sm);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em;">Upcoming</h3>';
    upcoming.forEach(l => { html += renderMeetingCard(l, false); });
  }
  if (past.length) {
    html += '<h3 style="font-family:var(--font-display);font-weight:600;font-size:var(--text-sm);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:var(--space-4);">Past Meetings</h3>';
    past.forEach(l => { html += renderMeetingCard(l, true); });
  }
  html += '</div>';
  return html;
}

function renderMeetingsCalendar(meetingLeads) {
  const year = state.calendarYear;
  const month = state.calendarMonth;
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDayOfWeek = firstDay.getDay();
  const totalDays = lastDay.getDate();

  const todayStr = today.toISOString().split('T')[0];

  // Meetings by date
  const meetingsByDate = {};
  meetingLeads.forEach(l => {
    if (l.crm.meetingDate) {
      const d = l.crm.meetingDate.split('T')[0];
      if (!meetingsByDate[d]) meetingsByDate[d] = [];
      meetingsByDate[d].push(l);
    }
  });

  let html = `
    <div class="calendar-nav">
      <button class="btn btn-ghost btn-sm" data-action="cal-prev" aria-label="Previous month"><i data-lucide="chevron-left" aria-hidden="true"></i></button>
      <h3>${months[month]} ${year}</h3>
      <button class="btn btn-ghost btn-sm" data-action="cal-next" aria-label="Next month"><i data-lucide="chevron-right" aria-hidden="true"></i></button>
    </div>
    <div class="calendar-grid">
  `;
  days.forEach(d => { html += `<div class="calendar-day-header">${d}</div>`; });

  // Previous month padding
  const prevMonthLastDay = new Date(year, month, 0).getDate();
  for (let i = startDayOfWeek - 1; i >= 0; i--) {
    html += `<div class="calendar-day other-month"><span class="day-number">${prevMonthLastDay - i}</span></div>`;
  }

  // Current month
  for (let d = 1; d <= totalDays; d++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const isToday = dateStr === todayStr;
    const meetings = meetingsByDate[dateStr] || [];
    html += `
      <div class="calendar-day ${isToday ? 'today' : ''}" data-date="${dateStr}" style="position:relative;">
        <span class="day-number">${d}</span>
        ${meetings.map(m => `<span class="meeting-dot"></span><span class="meeting-name">${escapeHtml(m.businessName)}</span>`).join('')}
      </div>
    `;
  }

  // Next month padding
  const remaining = 42 - (startDayOfWeek + totalDays);
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="calendar-day other-month"><span class="day-number">${i}</span></div>`;
  }

  html += '</div>';
  return html;
}

      </div>
    `;
  } else {
    html += '<div class="lead-grid">';
    currentLeads.forEach(l => {
      const crm = l.crm || {};
      const fuDays = daysUntil(crm.followUpDate);
      let fuLabel = '';
      let fuClass = '';
      if (crm.followUpDate && fuDays !== null) {
        if (fuDays > 7) { fuLabel = `Follow up in ${fuDays} days`; fuClass = 'green'; }
        else if (fuDays > 0) { fuLabel = `Follow up in ${fuDays} days`; fuClass = 'orange'; }
        else if (fuDays === 0) { fuLabel = 'Follow up TODAY'; fuClass = 'warning'; }
        else { fuLabel = `Overdue by ${Math.abs(fuDays)} days`; fuClass = 'error'; }
      }
      const lastNote = crm.notes && crm.notes.length > 0 ? crm.notes[0] : null;
      const showDeleteConfirm = state.deleteConfirm[l.id];

      html += `
        <div class="card archive-card">
          <div class="lead-card-header">
            <div class="lead-card-name">${escapeHtml(l.businessName)}</div>
            <div style="display:flex;gap:var(--space-2);">
              ${l.industry ? `<span class="badge badge-neutral">${escapeHtml(l.industry)}</span>` : ''}
            </div>
          </div>
          <div class="archive-card-meta">
            <span class="badge ${getStageBadge(crm.stage || 1)}">${getStageName(crm.stage || 1)}</span>
            <span class="badge ${getDispositionBadge(crm.disposition)}">${getDispositionLabel(crm.disposition)}</span>
            ${crm.dateLastContact ? `<span style="color:var(--color-text-muted);">Last contact: ${formatDate(crm.dateLastContact)}</span>` : ''}
          </div>
          ${fuLabel ? `<div class="archive-follow-up ${fuClass}">${fuDays !== null && fuDays <= 0 ? '<i data-lucide="alert-triangle" style="width:12px;height:12px;display:inline;" aria-hidden="true"></i> ' : ''}${fuLabel}</div>` : ''}
          ${l.description ? `<p class="lead-card-desc" style="-webkit-line-clamp:1;">${escapeHtml(l.description)}</p>` : ''}
          ${lastNote ? `<p style="font-size:var(--text-xs);color:var(--color-text-faint);">${escapeHtml(lastNote.text).substring(0, 80)}${lastNote.text.length > 80 ? '...' : ''}</p>` : ''}
          ${renderAttribution(l)}
          ${renderLastActivity(l)}
          <div class="lead-card-actions">
            <button class="btn btn-primary btn-sm" data-action="reactivate" data-id="${l.id}"><i data-lucide="refresh-cw" aria-hidden="true"></i> Reactivate</button>
            <button class="btn btn-danger-ghost btn-sm" data-action="confirm-delete" data-id="${l.id}"><i data-lucide="trash-2" aria-hidden="true"></i> Delete</button>
          </div>
          ${showDeleteConfirm ? `
            <div class="confirm-delete">
              <span>Are you sure? This cannot be undone.</span>
              <button class="btn btn-danger-ghost btn-sm" data-action="delete-lead" data-id="${l.id}">Yes, delete</button>
              <button class="btn btn-ghost btn-sm" data-action="cancel-delete" data-id="${l.id}">Cancel</button>
            </div>
          ` : ''}
        </div>
      `;
    });
    html += '</div>';
  }

  container.innerHTML = html;
  lucide.createIcons({ nodes: [container] });
}

// CRM events
document.getElementById('section-crm').addEventListener('click', e => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;
  const id = target.dataset.id;

  if (action === 'call-lead') { openDialer(id, target.dataset.num); return; }
  if (action === 'generate-email') {
    const lead = getLeadById(id);
    if (lead) openModal('email', lead);
    return;
  } else if (action === 'crm-view') {
    state.crmView = target.dataset.view;
    saveState();
    renderCRM();
  } else if (action === 'cycle-priority') {
    const lead = getLeadById(id);
    if (lead && lead.crm) {
      const cycle = { high: 'medium', medium: 'low', low: 'high' };
      lead.crm.priority = cycle[lead.crm.priority];
      saveState();
      renderCRM();
    }
  } else if (action === 'follow-up-chip') {
    const lead = getLeadById(id);
    if (lead && lead.crm) {
      lead.crm.followUpDate = daysFromNow(parseInt(target.dataset.days));
      saveState();
      renderCRM();
    }
  } else if (action === 'toggle-meeting') {
    const lead = getLeadById(id);
    if (lead && lead.crm) {
      lead.crm.meetingBooked = !lead.crm.meetingBooked;
      if (lead.crm.meetingBooked && !lead.crm.meetingDate) {
        lead.crm.meetingDate = dateTimeFromNow(7, 10, 0);
      }
      addActivity(lead, lead.crm.meetingBooked ? 'booked a meeting' : 'cancelled meeting');
      saveState();
      renderCRM();
      renderSidebarBadges();
    }
  } else if (action === 'add-note') {
    const input = document.getElementById('note-input-' + id);
    if (input && input.value.trim()) {
      addNote(id, input.value.trim());
      renderCRM();
    }
  } else if (action === 'expand-notes') {
    state.expandedNotes[id] = true;
    renderCRM();
  } else if (action === 'collapse-notes') {
    state.expandedNotes[id] = false;
    renderCRM();
  } else if (action === 'archive-lead') {
    const disposition = target.dataset.disposition;
    const lead = getLeadById(id);
    // Prompt for loss reason for not_interested / archived (task 6)
    if (lead && (disposition === 'not_interested' || disposition === 'archived')) {
      openOutcomeReasonModal(id, disposition);
      return;
    }
    const row = document.getElementById('crm-row-' + id);
    if (row) row.classList.add('lead-archiving');
    setTimeout(() => {
      archiveLead(id, disposition);
      showToast('Lead moved to Archive', 'info');
      renderAll();
    }, 300);
  } else if (action === 'generate-brief') {
    const lead = getLeadById(id);
    if (lead) openBriefModal(lead);
  } else if (action === 'toggle-today-filter') {
    const scope = target.dataset.scope;
    if (scope === 'crm') {
      state.filters.crm.today = !state.filters.crm.today;
      saveState();
      renderCRM();
    } else if (scope === 'lead-bank') {
      state.filters.leadBank.today = !state.filters.leadBank.today;
      saveState();
      renderLeadBank();
    }
  } else if (action === 'bulk-clear') {
    state.bulkSelection = [];
    state.bulkScope = null;
    renderCRM();
  }
});
document.getElementById('section-crm').addEventListener('change', e => {
  if (e.target.dataset.action === 'log-call') {
    const outcome = e.target.value;
    if (outcome) {
      logCall(e.target.dataset.id, outcome);
      showToast('Call logged: ' + callOutcomeLabel(outcome), 'success');
      renderCRM();
    }
    return;
  }
  const action = e.target.dataset.action;
  const id = e.target.dataset.id;
  const f = e.target.dataset.filter;

  if (action === 'change-stage') {
    const lead = getLeadById(id);
    if (lead && lead.crm) {
      const newStageNum = parseInt(e.target.value);
      // Prompt for win reason when moving to Closed Won (stage 6)
      if (newStageNum === 6 && lead.crm.stage !== 6) {
        lead.crm.stage = 6;
        lead.crm.dateLastContact = todayISO;
        addActivity(lead, 'changed stage to Closed Won');
        saveState();
        openOutcomeReasonModal(id, 'won');
        renderCRM();
        renderSidebarBadges();
        return;
      }
      lead.crm.stage = newStageNum;
      lead.crm.dateLastContact = todayISO;
      addActivity(lead, 'changed stage to ' + getStageName(newStageNum));
      saveState();
      const row = document.getElementById('crm-row-' + id);
      if (row) row.classList.add('stage-updated');
      renderCRM();
      renderSidebarBadges();
    }
  } else if (action === 'change-disposition') {
    const lead = getLeadById(id);
    if (lead && lead.crm) {
      const newDisp = e.target.value;
      if (newDisp === 'not_interested' || newDisp === 'archived') {
        openOutcomeReasonModal(id, newDisp);
      } else {
        lead.crm.disposition = newDisp;
        addActivity(lead, 'set disposition to ' + getDispositionLabel(newDisp));
        saveState();
      }
    }
  } else if (action === 'change-first-contact') {
    updateCRM(id, { dateFirstContact: e.target.value });
  } else if (action === 'change-last-contact') {
    updateCRM(id, { dateLastContact: e.target.value });
  } else if (action === 'change-follow-up') {
    updateCRM(id, { followUpDate: e.target.value });
    renderCRM();
  } else if (action === 'change-meeting-date') {
    updateCRM(id, { meetingDate: e.target.value });
  } else if (action === 'change-meeting-notes') {
    updateCRM(id, { meetingNotes: e.target.value });
  } else if (action === 'change-deal-value') {
    const v = parseFloat(e.target.value);
    updateCRM(id, { dealValue: Number.isFinite(v) && v >= 0 ? v : 0 });
    renderCRM();
  } else if (action === 'bulk-toggle') {
    const scope = e.target.dataset.scope;
    state.bulkScope = scope;
    state.bulkSelection = state.bulkSelection || [];
    if (e.target.checked) {
      if (!state.bulkSelection.includes(id)) state.bulkSelection.push(id);
    } else {
      state.bulkSelection = state.bulkSelection.filter(x => x !== id);
    }
    if (scope === 'crm') renderCRM(); else renderLeadBank();
  } else if (action === 'bulk-action') {
    applyBulkAction(e.target.dataset.scope, e.target.value);
    e.target.value = '';
  }

  if (f === 'crm-search') { state.filters.crm.search = e.target.value; saveState(); renderCRM(); }
  if (f === 'crm-stage') { state.filters.crm.stage = e.target.value; saveState(); renderCRM(); }
  if (f === 'crm-priority') { state.filters.crm.priority = e.target.value; saveState(); renderCRM(); }
  if (f === 'crm-overdue') { state.filters.crm.overdueOnly = e.target.checked; saveState(); renderCRM(); }
  if (f === 'crm-assigned') { state.filters.crm.assignedTo = e.target.value; saveState(); renderCRM(); }
  if (f === 'crm-sort') { state.filters.crm.sort = e.target.value; saveState(); renderCRM(); }
  if (f === 'crm-show-all') { state.filters.crm.assignedTo = e.target.checked ? 'all' : getCurrentUser(); saveState(); renderCRM(); }

  // Research checklist
  if (action === 'research-check') {
    const lead = getLeadById(id);
    if (lead) {
      if (!lead.researchChecklist) lead.researchChecklist = [];
      const idx = parseInt(e.target.dataset.index);
      if (e.target.checked) { if (!lead.researchChecklist.includes(idx)) lead.researchChecklist.push(idx); }
      else { lead.researchChecklist = lead.researchChecklist.filter(i => i !== idx); }
      saveState();
    }
  }

  if (action === 'reassign-lead') {
    const lead = getLeadById(id);
    if (lead && canReassignLeads()) {
      lead.assignedTo = e.target.value;
      addActivity(lead, 'reassigned to ' + e.target.value);
      saveState();
      showToast('Lead reassigned to ' + e.target.value, 'info');
    }
  }
});

});

// Family key used to dedupe synthesized historical entries against real logged activity[]
// entries (same user + same kind of action + same calendar day).
function activityFamily(action) {
  const t = String(action || '').toLowerCase();
  if (t.includes('logged call') || t.includes('logged a call') || t.startsWith('called')) return 'call';
  if (t.includes('meeting')) return 'meeting';
  if (t.includes('disposition')) return 'disposition';
  if (t.includes('won')) return 'won';
  if (t.includes('reassigned')) return 'reassigned';
  if (t.includes('started working')) return 'started';
  if (t.includes('qualified')) return 'qualified';
  if (t.includes('moved to crm') || t.includes('crm')) return 'crm';
  if (t.includes('note')) return 'note';
  if (t.includes('stage')) return 'stage';
  if (t.includes('archived') || t.includes('archive')) return 'archived';
  if (t.includes('reactivated') || t.includes('reactivate')) return 'reactivated';
  return t;
}
function dayKey(isoDate) {
  const d = new Date(isoDate);
  return isNaN(d) ? String(isoDate || '') : d.toISOString().slice(0, 10);
}
// READ-ONLY: derive timeline entries from historical crm.* fields + status so the master sees
// past rep work that predates per-action activity[] logging. Never written back; tagged
// synthetic:true and "(historical)".
function getSynthesizedActivities(realKeys) {
  const out = [];
  state.leads.forEach(lead => {
    const crm = lead.crm || {};
    const owner = lead.assignedTo || lead.claimedBy || lead.movedToCRMBy || lead.qualifiedBy || 'Unknown';
    const base = { leadName: lead.businessName, leadId: lead.id, leadStatus: lead.status, synthetic: true };
    const candidates = [];
    if (crm.dateFirstContact) candidates.push({ by: owner, action: 'first contact (historical)', date: crm.dateFirstContact, _fam: 'call' });
    if (crm.dateLastContact && crm.dateLastContact !== crm.dateFirstContact) candidates.push({ by: owner, action: 'last contact (historical)', date: crm.dateLastContact, _fam: 'call' });
    if (crm.disposition && crm.disposition !== 'nurture' && crm.disposition !== '') candidates.push({ by: owner, action: 'disposition: ' + getDispositionLabel(crm.disposition) + ' (historical)', date: crm.dateLastContact || crm.dateMovedToCRM || lead.dateAdded, _fam: 'disposition' });
    if (crm.meetingBooked && crm.meetingDate) candidates.push({ by: owner, action: 'meeting booked (historical)', date: crm.meetingDate, _fam: 'meeting' });
    if (lead.qualifiedBy && lead.qualification && lead.qualification.dateQualified) candidates.push({ by: lead.qualifiedBy, action: 'qualified (historical)', date: lead.qualification.dateQualified, _fam: 'qualified' });
    if ((lead.movedToCRMBy || lead.status === 'crm') && crm.dateMovedToCRM) candidates.push({ by: lead.movedToCRMBy || owner, action: 'moved to CRM (historical)', date: crm.dateMovedToCRM, _fam: 'crm' });
    candidates.forEach(c => {
      if (!c.date) return;
      const k = (c.by || 'Unknown') + '|' + c._fam + '|' + dayKey(c.date);
      if (realKeys.has(k)) return; // a real logged activity already covers this user+family+day
      realKeys.add(k);
      out.push({ by: c.by || 'Unknown', action: c.action, date: c.date, ...base });
    });
  });
  return out;
}
function getAllActivities() {
  const activities = [];
  const realKeys = new Set();
  state.leads.forEach(lead => {
    if (!lead.activity) return;
    lead.activity.forEach(a => {
      if (!a || typeof a.action !== 'string') return; // guard malformed entries (M12)
      activities.push({ ...a, leadName: lead.businessName, leadId: lead.id, leadStatus: lead.status });
      realKeys.add((a.by || 'Unknown') + '|' + activityFamily(a.action) + '|' + dayKey(a.date));
    });
  });
  // Append read-only historical entries derived from crm.* fields/status.
  getSynthesizedActivities(realKeys).forEach(a => activities.push(a));
  activities.sort((a, b) => new Date(b.date) - new Date(a.date));
  return activities;
}

function formatActivityTime(isoDate) {
  const d = new Date(isoDate);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  const isYesterday = d.toDateString() === yesterday.toDateString();
  const hours = d.getHours();
  const mins = d.getMinutes().toString().padStart(2, '0');
  const ampm = hours >= 12 ? 'pm' : 'am';
  const h12 = hours % 12 || 12;
  const timeStr = h12 + ':' + mins + ampm;
  if (isToday) return 'Today at ' + timeStr;
  if (isYesterday) return 'Yesterday at ' + timeStr;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear() + ', ' + timeStr;
}

function describeAction(action) {
  const action0 = String(action == null ? '' : action);
  const a = action0.toLowerCase();
  if (a.includes('logged call') || a.includes('logged a call') || a.startsWith('called')) return action0;
  if (a.includes('disposition')) return action0;
  if (a.includes('meeting')) return action0;
  if (a.includes('won')) return action0;
  if (a.includes('reassigned')) return action0;
  if (a.includes('started working')) return action0;
  if (a.includes('qualified')) return a.includes('historical') ? action0 : 'qualified';
  if (a.includes('moved to crm') || a.includes('crm')) return a.includes('historical') ? action0 : 'moved to CRM';
  if (a.includes('note') || a.includes('added note')) return 'added a note';
  if (a.includes('stage')) return 'changed stage to ' + action0.replace(/.*stage\s*(to\s*)?/i, '');
  if (a.includes('archived') || a.includes('archive')) return 'archived';
  if (a.includes('reactivated') || a.includes('reactivate')) return 'reactivated';
  return action0;
}

function matchesActionFilter(action, filter) {
  if (filter === 'all') return true;
  const a = String(action || '').toLowerCase();
  switch (filter) {
    case 'call': return a.includes('logged call') || a.includes('logged a call') || a.startsWith('called');
    case 'disposition': return a.includes('disposition');
    case 'meeting': return a.includes('meeting');
    case 'won': return a.includes('won');
    case 'reassigned': return a.includes('reassigned');
    case 'started': return a.includes('started working');
    case 'qualified': return a.includes('qualified');
    case 'moved to CRM': return (a.includes('moved to crm') || a.includes('crm')) && !a.includes('logged call');
    case 'note': return a.includes('note');
    case 'stage': return a.includes('stage');
    case 'archived': return a.includes('archived') || a.includes('archive');
    case 'reactivated': return a.includes('reactivated') || a.includes('reactivate');
    default: return true;
  }
}

function getActionBadgeClass(action) {
  const a = String(action || '').toLowerCase();
  if (a.includes('logged call') || a.includes('logged a call') || a.startsWith('called')) return 'badge-orange';

function renderActivityMonitor() {
  if (!canViewActivityMonitor()) return;
  const container = document.getElementById('activity-monitor-content');
  const allActivities = getAllActivities();

  // Read filter state
  const filterUser = state.amFilterUser || 'all';
  const filterAction = state.amFilterAction || 'all';
  const filterDate = state.amFilterDate || 'all';

  // Apply filters
  const now = new Date();
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  // Monday-start week, unified with Reports (was Sunday-start here) (M3).
  const startOfWeek = new Date(startOfToday);
  startOfWeek.setDate(startOfWeek.getDate() - ((startOfWeek.getDay() + 6) % 7));

  let filtered = allActivities.filter(a => {
    if (filterUser !== 'all' && a.by !== filterUser) return false;
    if (!matchesActionFilter(a.action, filterAction)) return false;
    if (filterDate === 'today' && new Date(a.date) < startOfToday) return false;
    if (filterDate === 'week' && new Date(a.date) < startOfWeek) return false;
    return true;
  });

  const uniqueBreakdownUsers = [...new Set(breakdownUsers)];

  container.innerHTML = `
    <div class="section-header">
      <h1>Activity Monitor</h1>
    </div>
    <p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-6);">Track all team activity across every lead in real time.</p>

    <div class="am-stats-bar">
      <div class="am-stat-card">
        <div class="am-stat-label">Total Actions</div>
        <div class="am-stat-value">${totalActions}</div>
      </div>
      <div class="am-stat-card">
        <div class="am-stat-label">Actions Today</div>
        <div class="am-stat-value">${actionsToday}</div>
      </div>
      <div class="am-stat-card">
        <div class="am-stat-label">Calls Today</div>
        <div class="am-stat-value">${callsToday}</div>
      </div>
      <div class="am-stat-card">
        <div class="am-stat-label">Most Active User</div>
        <div class="am-stat-value">${escapeHtml(mostActiveName)}${mostActive ? '<span class="am-stat-value-sub">(' + mostActive[1] + ' actions)</span>' : ''}</div>
      </div>
    </div>

    <div class="am-filters">
      <div class="am-filter-group">
        <label>Team Member</label>
        <select id="am-filter-user">
          <option value="all"${filterUser === 'all' ? ' selected' : ''}>All Members</option>
          ${AM_TEAM_MEMBERS.map(n => `<option value="${n}"${filterUser === n ? ' selected' : ''}>${n}</option>`).join('')}
          ${allUsers.filter(u => !AM_TEAM_MEMBERS.includes(u) && u !== 'Unknown').map(n => `<option value="${n}"${filterUser === n ? ' selected' : ''}>${n}</option>`).join('')}

// ========== RENDER: REPORTS ==========
function renderReports() {
  const container = document.getElementById('reports-content');
  const dateRange = state.reportRange || 'week';
  const now = new Date();
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startOfWeek = new Date(startOfToday); startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay() + 1);
  const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const startOfLastWeek = new Date(startOfWeek); startOfLastWeek.setDate(startOfLastWeek.getDate() - 7);
  const endOfLastWeek = new Date(startOfWeek);

  let rangeStart = null;
  if (dateRange === 'week') rangeStart = startOfWeek;
  else if (dateRange === 'lastweek') { rangeStart = startOfLastWeek; }
  else if (dateRange === 'month') rangeStart = startOfMonth;
  const rangeEnd = dateRange === 'lastweek' ? endOfLastWeek : now;

  function countActions(user, actionMatch) {
    return state.leads.reduce((count, lead) => {
      if (!lead.activity) return count;
      return count + lead.activity.filter(a => {
        if (user && a.by !== user) return false;
        if (rangeStart && new Date(a.date) < rangeStart) return false;
        if (rangeEnd && new Date(a.date) > rangeEnd) return false;
        if (actionMatch && !a.action.includes(actionMatch)) return false;
        return true;
      }).length;
    }, 0);
  }
  function countFollowUpsDue(user) {
    return state.leads.filter(l => {
      if (l.status !== 'crm' || !l.crm || !l.crm.followUpDate) return false;
      if (user && l.assignedTo !== user) return false;
      const d = daysUntil(l.crm.followUpDate);
      return d !== null && d <= 7;
    }).length;
  }

  const currentUser = getCurrentUser();
  // Single-user mode: always show stats for the current user (Master).
  const users = [currentUser];

  function renderUserStats(user) {
    const calls = countActions(user, 'added lead') + countActions(user, 'changed stage');
    const emails = countActions(user, 'added note');
    const qualified = countActions(user, 'qualified');
    const movedCRM = countActions(user, 'moved to CRM');
    const meetings = state.leads.filter(l => l.crm && l.crm.meetingBooked && l.assignedTo === user).length;
    const followUps = countFollowUpsDue(user);
    return `
      <div class="report-user-card">
        <h3>${escapeHtml(user)}</h3>
        <div class="report-user-stat"><span>Calls / Outreach</span><strong>${calls}</strong></div>
        <div class="report-user-stat"><span>Notes Added</span><strong>${emails}</strong></div>
        <div class="report-user-stat"><span>Leads Qualified</span><strong>${qualified}</strong></div>
        <div class="report-user-stat"><span>Moved to CRM</span><strong>${movedCRM}</strong></div>
        <div class="report-user-stat"><span>Meetings Booked</span><strong>${meetings}</strong></div>
        <div class="report-user-stat"><span>Follow-ups Due (7d)</span><strong>${followUps}</strong></div>
      </div>
    `;
  }

  const rangeLabels = { week: 'This Week', lastweek: 'Last Week', month: 'This Month', all: 'All Time' };

  container.innerHTML = `
    <div class="section-header">
      <h1>Reports</h1>
    </div>
    <p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-6);">Performance overview for your team.</p>
    <div class="filter-bar" style="margin-bottom:var(--space-6);">
      <select class="form-select" id="report-range" aria-label="Date range">
        ${['week','lastweek','month','all'].map(r => `<option value="${r}"${dateRange===r?' selected':''}>${rangeLabels[r]}</option>`).join('')}
      </select>
    </div>
    <div class="report-comparison">
      ${users.map(u => renderUserStats(u)).join('')}
    </div>
  `;
  lucide.createIcons({ nodes: [container] });
}

function csvEscape(val) {
  if (val === null || val === undefined) return '';
  const s = String(val);
  if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
function exportLeadsCSV() {
  const cols = ['Business Name','Industry','Website','Status','Stage','Assigned To','Deal Value','Date Added','Primary Contact','Phone','Email','Qualification Summary'];
  const rows = [cols.join(',')];
  state.leads.forEach(l => {
    const pc = getPrimaryContact(l) || {};
    const phone = (l.phones && l.phones[0]) || (pc.phone) || '';
    const email = (l.emails && l.emails[0]) || (pc.email) || '';
    const stageName = l.crm ? getStageName(l.crm.stage) : '';
    const dv = l.crm ? getDealValue(l) : '';
    const q = l.qualification
      ? [l.qualification.strategyDesign, l.qualification.experienceDesign, l.qualification.digitalCommerce, l.qualification.weaknessesOpportunities].filter(Boolean).join(' | ')
      : '';
    rows.push([
      csvEscape(l.businessName),
      csvEscape(l.industry),
      csvEscape(l.website),
      csvEscape(l.status),
      csvEscape(stageName),
      csvEscape(l.assignedTo || ''),
      csvEscape(dv),
      csvEscape(l.dateAdded || ''),
      csvEscape(pc.name || ''),
      csvEscape(phone),
      csvEscape(email),
      csvEscape(q)
    ].join(','));
  });
  const csv = rows.join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  const filename = `lodgehelm-leads-${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}.csv`;
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Exported ' + state.leads.length + ' leads', 'success');
}

// ========== BULK ACTIONS ==========
function applyBulkAction(scope, value) {
  if (!value || !state.bulkSelection || state.bulkSelection.length === 0) return;
  const ids = [...state.bulkSelection];
  let n = 0;
  if (value.startsWith('reassign:')) {
    if (!canReassignLeads()) { showToast('Not allowed', 'error'); return; }
    const to = value.slice('reassign:'.length);
    ids.forEach(id => {
      const l = getLeadById(id);
      if (l) { l.assignedTo = to; addActivity(l, 'reassigned to ' + to); n++; }
    });
  } else if (value.startsWith('stage:')) {
    const s = parseInt(value.slice('stage:'.length));
    ids.forEach(id => {
      const l = getLeadById(id);
      if (l && l.crm) {
        l.crm.stage = s;
        l.crm.dateLastContact = todayISO;
        addActivity(l, 'changed stage to ' + getStageName(s));
        n++;
      }
    });
  } else if (value === 'archive') {
    ids.forEach(id => { archiveLead(id, 'archived'); n++; });
  } else if (value === 'delete') {
    if (!confirm('Delete ' + ids.length + ' leads? This cannot be undone.')) return;
    ids.forEach(id => { deleteLead(id); n++; });
  }
  saveState();
  state.bulkSelection = [];
  state.bulkScope = null;
  showToast(n + ' leads updated', 'success');
  renderAll();
}

function pickFounderForLead(lead) {

function getPrimaryGap(lead) {
  const w = (lead.qualification && lead.qualification.weaknessesOpportunities) || '';
  const first = w.split('\n')[0].replace(/^[-*\s]+/, '').trim();
  return first || 'Not yet identified — probe for the single biggest friction point in the first 10 minutes.';
}
function getRecommendedAngle(lead) {
  return "Lead with positioning. Most of their friction is upstream — the offer, the story, the brand. Show them you fix the root cause, not the symptoms.";
}
function getOpeningQuestions(lead) {
  const industry = (lead.industry || '').toLowerCase();
  const q = lead.qualification || {};
  const base = [
    "What's the one thing about how you're growing right now that keeps you up at night?",
    "If we could fix one thing about how customers find you or buy from you, what would it be?",
    "Who inside your business actually owns this problem — and what have they tried already?"
  ];
  if (/restaurant|food|bakery|coffee/.test(industry)) base[0] = "Walk me through a typical Friday night — where does the operation feel tightest?";
  if (/ecommerce|shop|retail/.test(industry)) base[0] = "Where in the funnel are you losing the most — traffic, conversion, or repeat?";
  return base;
}
function getRedFlags(lead) {
  const flags = [];
  const notes = (lead.crm && lead.crm.notes || []).map(n => (n.text || '').toLowerCase()).join(' ');
  const q = lead.qualification || {};
  if (/budget|cheap|price|cost/i.test(notes)) flags.push("Price-sensitive signals in notes — anchor value early.");
  if (/agency|consultant|already/i.test(notes)) flags.push("Mentioned existing agency relationship — understand what's working and what's not before positioning us.");
  if (!q.growthIntent || q.growthIntent.trim().length < 20) flags.push("Growth intent is thin — probe for urgency and specific targets.");
  if (!lead.crm || !lead.crm.dateFirstContact) flags.push("No prior contact recorded — verify the meeting booking is real before the call.");
  return flags;
}
function buildBriefText(lead) {
  const pc = getPrimaryContact(lead) || {};

  const gap = getPrimaryGap(lead);

  const recent = (lead.activity || []).slice(0, 5).map(a => `- ${a.by} ${a.action} (${formatTimeAgo(a.date)})`).join('\n') || '- No recent activity logged';
  const meetingLine = lead.crm && lead.crm.meetingDate ? formatDateTime(lead.crm.meetingDate) : 'Not yet scheduled';

  return `MEETING BRIEF — ${lead.businessName}
${lead.industry ? 'Industry: ' + lead.industry : ''}

CONTACT
${pc.name || '—'}${pc.title ? ', ' + pc.title : ''}
${pc.email || ''} ${pc.phone || ''}

MEETING
${meetingLine}
Assigned to: ${founder}

PRIMARY GAP
${gap}

QUALIFICATION SUMMARY
Strategy & Design: ${q.strategyDesign || '—'}
Experience Design: ${q.experienceDesign || '—'}
Digital Commerce: ${q.digitalCommerce || '—'}

RECENT ACTIVITY
${recent}

RECOMMENDED ANGLE
${angle}

OPENING QUESTIONS

RED FLAGS
${redFlags.length ? redFlags.map(f => '- ' + f).join('\n') : '- None flagged. Proceed with confidence.'}

}

  const content = document.getElementById('modal-content');
  content.innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
  document.getElementById('modal-overlay').setAttribute('aria-hidden', 'false');
  state.modalOpen = true;
  lucide.createIcons({ nodes: [content] });

  const reasonsEl = document.getElementById('outcome-reasons');
  reasonsEl.addEventListener('change', () => {
    const sel = reasonsEl.querySelector('input[name="outcome-reason"]:checked');
    document.getElementById('outcome-other-wrap').style.display = (sel && sel.value === 'Other') ? 'block' : 'none';
  });
  document.getElementById('outcome-save-btn').addEventListener('click', () => {
    const sel = reasonsEl.querySelector('input[name="outcome-reason"]:checked');
    let reason = sel ? sel.value : '';
    if (reason === 'Other') {
      const other = document.getElementById('outcome-other-input').value.trim();
      reason = other || 'Other';
    }
    if (!lead.crm) lead.crm = {};
    lead.crm.outcomeReason = reason;
    if (isWon) {
      addActivity(lead, 'won (' + reason + ')');
      saveState();
      showToast('Nice one. Closed Won logged.', 'success');
    } else {
      // mode is 'not_interested' or 'archived' — archive the lead
      addActivity(lead, 'archived (' + mode + ', reason: ' + reason + ')');
      archiveLead(leadId, mode);
      showToast('Lead moved to Archive', 'info');
    }
    closeModal();
    renderAll();
  });
}

// ========== DUPLICATE DETECTION ==========
function normaliseBusinessName(name) {
  return String(name || '')
    .toLowerCase()
    .replace(/\b(ltd|limited|inc|llc|co|company|the|and|&)\b/g, '')
    .replace(/[^a-z0-9]+/g, '')
    .trim();
}
function findSimilarLeads(name) {
  const norm = normaliseBusinessName(name);
  if (norm.length < 3) return [];
  return state.leads.filter(l => {
    const ln = normaliseBusinessName(l.businessName);
    if (!ln) return false;
    return ln === norm || ln.includes(norm) || norm.includes(ln);
  });
}

// ========== AI CHATBOT (LodgeHelm Brain) ==========
const CHAT_SYSTEM_PROMPT = `You are LodgeHelm Brain, the internal AI assistant for LodgeHelm. You help Melusi (founder) sell and run outreach faster. Be concise, practical and plain-spoken.

# THE PRODUCT
LodgeHelm is software for African safari lodges and tour operators. It catches every booking enquiry (website, email, WhatsApp, OTAs) and replies instantly, 24/7, so fewer enquiries slip away and more turn into confirmed bookings. The core promise: "From enquiry to confirmed booking." A voice agent is roadmap-only — never lead with it.

# WHO WE SELL TO
Owners and managers of safari lodges, camps, tented camps, collections, and tour operators/DMCs — mostly South Africa, Kenya, Tanzania, Botswana, Namibia, Uganda, Zambia, Zimbabwe, Rwanda, plus some foreign-based operators who sell African safaris. Many are small, owner-run and often off-grid (game drives) — which is exactly why instant enquiry response matters.

# HOW WE REACH THEM
WhatsApp-first (highest pickup), then email, then LinkedIn for operators/DMCs. Phone via a local number, never +44. Signed "Melusi, LodgeHelm".

# TONE
Direct, warm, genuine. Short sentences. No buzzwords, no hype, no exclamation marks. Never use the word "free". Specific over generic. One clear soft call to action.

# WHAT YOU HELP WITH
Drafting/tightening outreach (email, WhatsApp, LinkedIn) personalised to a lead; picking the best angle from a lead's profile, funnel leak or outreach angle; objection handling ("we're too small", "we already reply fast", "no budget"); follow-up sequences; what to say on a call; prioritising which leads to work.

# RULES
- Use the current lead's details when provided.
- Emails under 140 words; WhatsApps under 60 words.
- If you learn a durable, reusable selling insight, prefix one line with [LEARNING]: so it can be saved.

# EXAMPLE QUESTIONS
- "Draft a first WhatsApp for this lead."
- "Best angle for a phone-only Botswana camp?"
- "They said 'we already reply quickly' — how do I respond?"
- "Write a 2-day follow-up email."
- "Which 10 leads should I work today and why?"`;

let chatHistory = [];
let chatLearnings = [];
let chatActiveView = 'chat';

function loadChatState() {
  try {
    const h = localStorage.getItem('lodgehelm-chat-history');
    if (h) chatHistory = JSON.parse(h);
    const l = localStorage.getItem('lodgehelm-learnings');
    if (l) chatLearnings = JSON.parse(l);
  } catch(e) {}
}
function saveChatState() {
  try {
    localStorage.setItem('lodgehelm-chat-history', JSON.stringify(chatHistory));
    localStorage.setItem('lodgehelm-learnings', JSON.stringify(chatLearnings));
  } catch(e) {}
}
const DEFAULT_GEMINI_KEY = ''; // Add your own Google Gemini API key via the chatbot settings (stored in localStorage).
function getApiKey() {
  // Prefer user-stored key, fall back to legacy, then to the embedded default (none by default).
  return localStorage.getItem('lodgehelm-gemini-key') || localStorage.getItem('lodgehelm-api-key') || DEFAULT_GEMINI_KEY;
}
function setApiKey(key) { localStorage.setItem('lodgehelm-gemini-key', key); }

function renderChatMessages() {
  const container = document.getElementById('chat-messages');
  if (chatHistory.length === 0) {
    container.innerHTML = '<div class="chat-msg system">Ask LodgeHelm Brain anything about leads, outreach, objections, pricing, or strategy.</div>';
    return;
  }
  container.innerHTML = chatHistory.filter(m => m.role !== 'system').map(m => {
    return `<div class="chat-msg ${m.role === 'user' ? 'user' : 'ai'}">${escapeHtml(m.content).replace(/\n/g, '<br>')}</div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function renderChatLearnings() {
  const container = document.getElementById('chat-view-learnings');
  if (chatLearnings.length === 0) {
    container.innerHTML = '<div style="padding:var(--space-4);color:var(--color-text-muted);font-size:var(--text-sm);text-align:center;">No learnings captured yet. The AI will tag insights with [LEARNING]: during conversations.</div>';
    return;
  }
  container.innerHTML = (isMasterUser() ? '<div style="text-align:right;margin-bottom:var(--space-3);"><button class="btn btn-danger-ghost btn-sm" id="clear-learnings">Clear All</button></div>' : '') +
    chatLearnings.map((l, i) => `<div class="chat-learning-item">${escapeHtml(l)}</div>`).join('');
  if (isMasterUser()) {
    const clearBtn = document.getElementById('clear-learnings');
    if (clearBtn) clearBtn.addEventListener('click', () => { chatLearnings = []; saveChatState(); renderChatLearnings(); });
  }
}

function switchChatView(view) {
  chatActiveView = view;
  ['chat', 'settings', 'learnings'].forEach(v => {
    document.getElementById('chat-view-' + v).style.display = v === view ? (v === 'chat' ? 'flex' : 'block') : 'none';
    document.getElementById('chat-tab-' + v).classList.toggle('active', v === view);
  });
  if (view === 'chat') renderChatMessages();
  if (view === 'learnings') renderChatLearnings();
  if (view === 'settings') document.getElementById('chat-api-key').value = getApiKey();
}

function getLeadContext() {
  // If user is viewing CRM, try to detect the lead in focus
  if (state.activeSection === 'crm') {
    const crmLeads = state.leads.filter(l => l.status === 'crm');
    if (crmLeads.length === 1) return crmLeads[0];
  }
  return null;
}

async function sendChatMessage(text) {
  if (!text.trim()) return;
  const apiKey = getApiKey();
  if (!apiKey) { switchChatView('settings'); return; }

  chatHistory.push({ role: 'user', content: text });
  renderChatMessages();

  // Show typing indicator
  const msgArea = document.getElementById('chat-messages');
  const typing = document.createElement('div');
  typing.className = 'chat-typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  msgArea.appendChild(typing);
  msgArea.scrollTop = msgArea.scrollHeight;

  // Build messages
  let systemMsg = CHAT_SYSTEM_PROMPT;
  if (chatLearnings.length > 0) {
    systemMsg += '\n\nPrevious learnings from the team:\n' + chatLearnings.map((l, i) => `${i+1}. ${l}`).join('\n');
  }
  const leadCtx = getLeadContext();
  let contextMsg = '';
  if (leadCtx) {
    contextMsg = '\n\n[Current lead in view: ' + JSON.stringify({
      businessName: leadCtx.businessName, industry: leadCtx.industry, website: leadCtx.website,
      qualification: leadCtx.qualification, crm: leadCtx.crm ? { stage: getStageName(leadCtx.crm.stage), disposition: leadCtx.crm.disposition, priority: leadCtx.crm.priority } : null
    }) + ']';
  }

  // Gemini expects role: 'user' | 'model', system prompt goes in systemInstruction,
  // and the message array carries the turn history. The latest user message is already
  // the last entry in chatHistory (we pushed it above), so we include the full history.
  const contents = chatHistory.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));

  // Append the lead context to the final user message (so it stays with that turn).
  if (contextMsg && contents.length > 0) {
    const last = contents[contents.length - 1];
    last.parts[0].text = last.parts[0].text + contextMsg;
  }

  try {
    const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + encodeURIComponent(apiKey), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents,
        systemInstruction: { parts: [{ text: systemMsg }] },
        generationConfig: { temperature: 0.7, maxOutputTokens: 1024 }
      })
    });
    typing.remove();
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      const errMsg = err.error?.message || 'API error (' + resp.status + ')';
      chatHistory.push({ role: 'assistant', content: 'Error: ' + errMsg });
    } else {
      const data = await resp.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response received.';
      chatHistory.push({ role: 'assistant', content: reply });

      // Check for learnings
      const learningMatch = reply.match(/\[LEARNING\]:\s*(.*?)(?:\n|$)/gi);
      if (learningMatch) {
        learningMatch.forEach(m => {
          const text = m.replace(/\[LEARNING\]:\s*/i, '').trim();
          if (text) chatLearnings.push(text);
        });
      }
    }
  } catch (e) {
    typing.remove();
    chatHistory.push({ role: 'assistant', content: 'Connection error: ' + e.message });
  }
  saveChatState();
  renderChatMessages();
}

async function testGeminiConnection() {
  const resultEl = document.getElementById('chat-test-result');
  const apiKey = document.getElementById('chat-api-key').value.trim() || getApiKey();
  if (!apiKey) {
    resultEl.textContent = 'Enter a key first.';
    resultEl.style.color = 'var(--color-danger, #c0392b)';
    return;
  }
  resultEl.textContent = 'Testing...';
  resultEl.style.color = 'var(--color-text-muted)';
  try {
    const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + encodeURIComponent(apiKey), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ role: 'user', parts: [{ text: 'Reply with the single word: ok' }] }],
        generationConfig: { temperature: 0, maxOutputTokens: 10 }
      })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      resultEl.textContent = 'Failed: ' + (err.error?.message || 'HTTP ' + resp.status);
      resultEl.style.color = 'var(--color-danger, #c0392b)';
      return;
    }
    const data = await resp.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (reply) {
      resultEl.textContent = 'Success — Gemini responded.';
      resultEl.style.color = 'var(--color-success, #1a7f37)';
    } else {
      resultEl.textContent = 'Unexpected response shape.';
      resultEl.style.color = 'var(--color-danger, #c0392b)';
    }
  } catch (e) {
    resultEl.textContent = 'Connection error: ' + e.message;
    resultEl.style.color = 'var(--color-danger, #c0392b)';
  }
}
